<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Dashboard | The Ready Mark</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0f172a;
      color: #f8f5ee;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      background: linear-gradient(145deg, #1c2740, #141c2f);
      border: 2px solid #c9a34a;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    .topbar {
      text-align: center;
      margin-bottom: 28px;
    }

    .topbar h1 {
      margin: 0 0 8px;
      font-size: 44px;
      color: #f8f5ee;
    }

    .topbar p {
      margin: 0;
      color: #cbd5e1;
      font-size: 17px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #d4af57;
      font-weight: bold;
    }

    select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-family: inherit;
    }

    select {
      background: #f8f5ee;
      color: #111827;
    }

    button {
      background: #d4af57;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
      min-width: 220px;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .property-header {
      margin: 10px 0 24px;
      padding: 18px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,87,0.22);
    }

    .property-header h2 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .property-meta {
      color: #cbd5e1;
      line-height: 1.7;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      border-radius: 12px;
      padding: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,87,0.18);
    }

    .stat-label {
      color: #d4af57;
      font-size: 14px;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
      color: #f8f5ee;
    }

    .split {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
      margin-bottom: 22px;
    }

    .panel {
      border-radius: 12px;
      padding: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,87,0.18);
    }

    .panel h3 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 24px;
      color: #f8f5ee;
    }

    .recent-item {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      line-height: 1.6;
    }

    .recent-item:last-child {
      border-bottom: none;
    }

    .status-pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.4px;
    }

    .status-premier {
      color: #111827;
      background: #f4d06f;
    }

    .status-verified {
      color: #0b3d20;
      background: #86efac;
    }

    .status-attention {
      color: #4a2f00;
      background: #fdba74;
    }

    .status-notclean {
      color: #5f0f18;
      background: #fca5a5;
    }

    .status-none {
      color: #cbd5e1;
      background: rgba(255,255,255,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      vertical-align: top;
    }

    th {
      color: #d4af57;
      font-weight: bold;
    }

    .muted {
      color: #cbd5e1;
    }

    .empty {
      color: #cbd5e1;
      font-style: italic;
    }

    .loading-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,87,0.18);
      color: #cbd5e1;
      line-height: 1.7;
    }

    .room-link {
      color: #93c5fd;
      text-decoration: underline;
      cursor: pointer;
      font-weight: bold;
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      width: auto;
      min-width: 0;
    }

    .room-link:hover {
      color: #bfdbfe;
    }

    @media (max-width: 980px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .split {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      button {
        min-width: 0;
      }
    }

    @media (max-width: 640px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .topbar h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <h1>Property Dashboard</h1>
      <p>View verification health, room status, and recent inspection activity.</p>
    </div>

    <div class="controls">
      <div>
        <label for="propertySelect">Select Property</label>
        <select id="propertySelect">
          <option value="">Loading properties...</option>
        </select>
      </div>

      <button id="loadDashboardBtn" type="button">Load Dashboard</button>
    </div>

    <div id="dashboardContent">
      <div class="loading-box">Choose a property to load dashboard data.</div>
    </div>
  </div>

  <script>
    const SESSION_TOKEN_KEY = "readymark_admin_token";

    const propertySelect = document.getElementById("propertySelect");
    const loadDashboardBtn = document.getElementById("loadDashboardBtn");
    const dashboardContent = document.getElementById("dashboardContent");

    function getSessionToken() {
      return sessionStorage.getItem(SESSION_TOKEN_KEY) || "";
    }

    function clearSessionToken() {
      sessionStorage.removeItem(SESSION_TOKEN_KEY);
    }

    function requireAdminToken() {
      const token = getSessionToken();
      if (!token) {
        alert("Unauthorized. Please sign in through admin.html first.");
        throw new Error("Missing admin session token");
      }
      return token;
    }

    function adminHeaders(extra = {}) {
      return {
        "x-admin-token": getSessionToken(),
        ...extra
      };
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function handleUnauthorizedResponse(response, data) {
      if (response.status === 401 || data?.error === "Unauthorized") {
        clearSessionToken();
        alert("Your admin session expired. Please sign in again through admin.html.");
        window.location.href = "/admin.html";
        return true;
      }
      return false;
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => null);
      return { response, data };
    }

    function formatDate(dateString) {
      if (!dateString) return "—";
      try {
        return new Date(dateString).toLocaleDateString();
      } catch {
        return "—";
      }
    }

    function getStatusClass(status) {
      const s = String(status || "").toLowerCase().trim();

      if (s === "ready mark premier") return "status-pill status-premier";
      if (s === "verified clean") return "status-pill status-verified";
      if (s === "needs attention") return "status-pill status-attention";
      if (s === "not clean") return "status-pill status-notclean";
      return "status-pill status-none";
    }

    function openRoomVerification(qrUrl) {
      if (!qrUrl) return;
      window.open(qrUrl, "_blank", "noopener,noreferrer");
    }

    function renderRecentActivity(items) {
      if (!items.length) {
        return `<div class="empty">No recent inspection activity yet.</div>`;
      }

      return items.map((item) => `
        <div class="recent-item">
          <button type="button" class="room-link" data-qr-url="${escapeHtml(item.qr_url || "")}">
            Room ${escapeHtml(item.room_number || "—")}
          </button><br>
          <span class="${getStatusClass(item.status)}">${escapeHtml(item.status || "No Inspection")}</span><br>
          <span class="muted">Score: ${escapeHtml(item.score ?? "—")} | Verified: ${escapeHtml(formatDate(item.inspection_date))}</span><br>
          <span class="muted">Verification ID: ${escapeHtml(item.verification_id || "—")}</span>
        </div>
      `).join("");
    }

    function renderFlaggedRooms(rooms) {
      const flaggedRooms = rooms.filter((room) =>
        ["needs attention", "not clean", "no inspection"].includes(String(room.status || "").toLowerCase().trim())
      );

      if (!flaggedRooms.length) {
        return `<div class="empty">No flagged rooms. Nice.</div>`;
      }

      return flaggedRooms.map((room) => `
        <div class="recent-item">
          <button type="button" class="room-link" data-qr-url="${escapeHtml(room.qr_url || "")}">
            Room ${escapeHtml(room.room_number || "—")}
          </button><br>
          <span class="${getStatusClass(room.status)}">${escapeHtml(room.status || "No Inspection")}</span><br>
          <span class="muted">Score: ${escapeHtml(room.score ?? "—")}</span><br>
          <span class="muted">Verification ID: ${escapeHtml(room.verification_id || "—")}</span>
        </div>
      `).join("");
    }

    function renderRoomTable(rooms) {
      if (!rooms.length) {
        return `<div class="empty">No rooms found for this property yet.</div>`;
      }

      return `
        <table>
          <thead>
            <tr>
              <th>Room</th>
              <th>Status</th>
              <th>Score</th>
              <th>Last Inspection</th>
              <th>Verification ID</th>
            </tr>
          </thead>
          <tbody>
            ${rooms.map((room) => `
              <tr>
                <td>
                  <button type="button" class="room-link" data-qr-url="${escapeHtml(room.qr_url || "")}">
                    Room ${escapeHtml(room.room_number || "—")}
                  </button>
                </td>
                <td><span class="${getStatusClass(room.status)}">${escapeHtml(room.status || "No Inspection")}</span></td>
                <td>${escapeHtml(room.score ?? "—")}</td>
                <td>${escapeHtml(formatDate(room.inspection_date))}</td>
                <td>${escapeHtml(room.verification_id || "—")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function attachRoomLinkHandlers() {
      document.querySelectorAll(".room-link").forEach((el) => {
        el.addEventListener("click", () => {
          openRoomVerification(el.dataset.qrUrl || "");
        });
      });
    }

    async function loadProperties() {
      requireAdminToken();

      try {
        const { response, data } = await fetchJson("/api/list-properties", {
          method: "GET",
          headers: adminHeaders({
            "Accept": "application/json"
          })
        });

        if (handleUnauthorizedResponse(response, data)) {
          return;
        }

        if (!response.ok || data?.error) {
          throw new Error(data?.error || "Failed to load properties");
        }

        propertySelect.innerHTML = '<option value="">Select a property</option>';

        const properties = Array.isArray(data?.properties) ? data.properties : [];

        properties.forEach((property) => {
          const option = document.createElement("option");
          option.value = property.id;
          option.textContent = `${property.property_name} (${property.property_slug})`;
          propertySelect.appendChild(option);
        });
      } catch (err) {
        propertySelect.innerHTML = '<option value="">Could not load properties</option>';
        dashboardContent.innerHTML =
          `<div class="loading-box">Error loading properties: ${escapeHtml(err.message)}</div>`;
      }
    }

    async function loadDashboard() {
      requireAdminToken();

      const propertyId = propertySelect.value;

      if (!propertyId) {
        dashboardContent.innerHTML = `<div class="loading-box">Please select a property.</div>`;
        return;
      }

      loadDashboardBtn.disabled = true;
      dashboardContent.innerHTML = `<div class="loading-box">Loading dashboard...</div>`;

      try {
        const { response, data } = await fetchJson(
          `/api/property-dashboard?propertyId=${encodeURIComponent(propertyId)}`,
          {
            method: "GET",
            headers: adminHeaders({
              "Accept": "application/json"
            })
          }
        );

        if (handleUnauthorizedResponse(response, data)) {
          return;
        }

        if (!response.ok || data?.error) {
          throw new Error(data?.error || "Failed to load dashboard");
        }

        const property = data?.property || {};
        const summary = data?.summary || {};
        const recentActivity = Array.isArray(data?.recentActivity) ? data.recentActivity : [];
        const rooms = Array.isArray(data?.rooms) ? data.rooms : [];

        const totalRooms = Number(summary.totalRooms ?? 0);
        const pending = Number(summary.pending ?? 0);
        const inspectedRooms = Math.max(0, totalRooms - pending);

        dashboardContent.innerHTML = `
          <div class="property-header">
            <h2>${escapeHtml(property.property_name || "Unnamed Property")}</h2>
            <div class="property-meta">
              Type: ${escapeHtml(property.property_type || "—")}<br>
              Location: ${escapeHtml(property.city || "—")}${property.state ? ", " + escapeHtml(property.state) : ""}<br>
              Status: ${escapeHtml(property.status || "—")}<br>
              Latest Inspection: ${escapeHtml(formatDate(summary.latestInspectionDate))}
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Total Rooms</div>
              <div class="stat-value">${escapeHtml(totalRooms)}</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Verification Rate</div>
              <div class="stat-value">${escapeHtml(summary.verificationRate ?? 0)}%</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Verified Clean</div>
              <div class="stat-value">${escapeHtml(summary.verifiedClean ?? 0)}</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Ready Mark Premier</div>
              <div class="stat-value">${escapeHtml(summary.premier ?? 0)}</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Needs Attention</div>
              <div class="stat-value">${escapeHtml(summary.needsAttention ?? 0)}</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Not Clean</div>
              <div class="stat-value">${escapeHtml(summary.notClean ?? 0)}</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">No Inspection</div>
              <div class="stat-value">${escapeHtml(pending)}</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Inspected Rooms</div>
              <div class="stat-value">${escapeHtml(inspectedRooms)}</div>
            </div>
          </div>

          <div class="split">
            <div class="panel">
              <h3>Recent Activity</h3>
              ${renderRecentActivity(recentActivity)}
            </div>

            <div class="panel">
              <h3>Flagged Rooms</h3>
              ${renderFlaggedRooms(rooms)}
            </div>
          </div>

          <div class="panel">
            <h3>Room Status Table</h3>
            ${renderRoomTable(rooms)}
          </div>
        `;

        attachRoomLinkHandlers();
      } catch (err) {
        dashboardContent.innerHTML = `<div class="loading-box">Error loading dashboard: ${escapeHtml(err.message)}</div>`;
      } finally {
        loadDashboardBtn.disabled = false;
      }
    }

    loadDashboardBtn.addEventListener("click", loadDashboard);

    try {
      loadProperties();
    } catch (err) {
      dashboardContent.innerHTML = `<div class="loading-box">Error: ${escapeHtml(err.message)}</div>`;
    }
  </script>
</body>
</html>
