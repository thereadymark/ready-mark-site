<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Ready Mark</title>
  <style>
    :root {
      --gold: #c7a257;
      --gold-soft: #d8bb7a;
      --text: #f3eee5;
      --muted: #b7b0a5;
      --line: rgba(199, 162, 87, 0.20);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.03), transparent 28%),
        linear-gradient(180deg, #1b1815 0%, #121416 45%, #121416 100%);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("/readymarklogonobackground2.PNG");
      background-repeat: repeat;
      background-size: 180px;
      opacity: 0.025;
      filter: grayscale(100%) brightness(1.05);
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .panel {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, rgba(27,31,35,0.98), rgba(21,24,27,0.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 34px 24px 18px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .crest {
      width: 120px;
      display: block;
      margin: 0 auto 12px;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 14px;
      max-width: 460px;
    }

    .brand-lockup::before,
    .brand-lockup::after {
      content: "";
      flex: 1;
      height: 2px;
      background: linear-gradient(
        90deg,
        rgba(199,162,87,0),
        rgba(216,187,122,0.95),
        rgba(199,162,87,0)
      );
      border-radius: 999px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      white-space: nowrap;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.06;
    }

    .subtext {
      max-width: 420px;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .content {
      padding: 24px;
    }

    .form-group + .form-group {
      margin-top: 16px;
    }

    label {
      display: block;
      margin-bottom: 9px;
      color: var(--gold-soft);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(199,162,87,0.14);
      border-radius: 14px;
      color: var(--text);
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: rgba(199,162,87,0.40);
      box-shadow: 0 0 0 3px rgba(199,162,87,0.08);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button, .back-link {
      min-height: 50px;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: none;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .primary-btn {
      background: linear-gradient(180deg, #d8ba73, #b8934c);
      color: #111315;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(199,162,87,0.22);
    }

    .secondary-btn, .back-link {
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border: 1px solid rgba(199,162,87,0.16);
    }

    .status-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 14px;
      line-height: 1.8;
      border: 1px solid rgba(199,162,87,0.16);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      white-space: pre-wrap;
      display: none;
    }

    .status-show {
      display: block;
    }

    .status-success {
      border-color: rgba(61,220,132,0.35);
      background: rgba(61,220,132,0.10);
      color: #e7fff1;
    }

    .status-error {
      border-color: rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.08);
      color: #ffe0e0;
    }

    .footer-note {
      padding: 0 24px 26px;
      text-align: center;
      color: #958d82;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .button-row {
        flex-direction: column;
      }

      button, .back-link {
        width: 100%;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="panel-header">
        <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" class="crest">
        <div class="brand-lockup">
          <div class="eyebrow">The Ready Mark</div>
        </div>
        <h1>Reset Password</h1>
        <div class="subtext">
          Create a new password for your Ready Mark guest account.
        </div>
      </div>

      <div class="content">
        <form id="reset-password-form" novalidate>
          <div class="form-group">
            <label for="new-password">New Password</label>
            <input
              id="new-password"
              type="password"
              placeholder="Enter a new password"
              autocomplete="new-password"
              required
            >
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm New Password</label>
            <input
              id="confirm-password"
              type="password"
              placeholder="Confirm your new password"
              autocomplete="new-password"
              required
            >
          </div>

          <div class="button-row">
            <button id="reset-password-btn" class="primary-btn" type="submit">Update Password</button>
            <a class="back-link" href="https://verify.thereadymarkgroup.com">Back to Verification Home</a>
          </div>
        </form>

        <div id="status-box" class="status-box" aria-live="polite"></div>
      </div>

      <div class="footer-note">
        The Ready Mark verification system is designed to provide visible, documented proof of inspection readiness.
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("reset-password-form");
    const submitBtn = document.getElementById("reset-password-btn");
    const newPasswordInput = document.getElementById("new-password");
    const confirmPasswordInput = document.getElementById("confirm-password");
    const statusBox = document.getElementById("status-box");

    function setStatus(message, type = "") {
      statusBox.className = "status-box status-show";
      if (type === "success") statusBox.classList.add("status-success");
      if (type === "error") statusBox.classList.add("status-error");
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status-box";
      statusBox.textContent = "";
    }

    function setSubmitting(isSubmitting) {
      submitBtn.disabled = isSubmitting;
      submitBtn.textContent = isSubmitting ? "Updating..." : "Update Password";
    }

    function getResetToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token") || "";
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      clearStatus();

      const token = getResetToken();
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!token) {
        setStatus("This reset link is missing a token.", "error");
        return;
      }

      if (!newPassword || !confirmPassword) {
        setStatus("Please complete both password fields.", "error");
        return;
      }

      if (newPassword.length < 6) {
        setStatus("Password must be at least 6 characters.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        setStatus("Passwords do not match.", "error");
        return;
      }

      setSubmitting(true);

      try {
        const res = await fetch("/api/guest-reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            token,
            password: newPassword
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(
            data?.error ||
            data?.message ||
            data?.details?.message ||
            "Unable to reset password."
          );
        }

        try {
          const cleanUrl = new URL(window.location.href);
          cleanUrl.searchParams.delete("token");
          window.history.replaceState({}, document.title, cleanUrl.pathname + cleanUrl.search);
        } catch {}

        form.reset();
        setStatus(
          "Password updated successfully. You can now return to the verification portal and log in with your new password.",
          "success"
        );
      } catch (error) {
        setStatus(error.message || "Unable to reset password.", "error");
      } finally {
        setSubmitting(false);
      }
    });
  </script>
</body>
</html>
