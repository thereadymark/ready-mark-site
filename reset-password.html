<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | The Ready Mark</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f6f3;
      --panel: rgba(255,255,255,0.97);
      --panel-soft: rgba(251,249,244,0.94);
      --card: rgba(255,255,255,0.88);
      --text: #111315;
      --muted: #6f6a61;
      --line: rgba(199, 162, 87, 0.18);
      --gold: #c7a257;
      --gold-dark: #ad8842;
      --success: #4f8f63;
      --error: #b35353;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Lato", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.55) 18%, rgba(255,255,255,0) 42%),
        linear-gradient(180deg, #fbfaf7 0%, #f7f6f3 58%, #f0ece3 100%);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 8%, rgba(199,162,87,0.14) 0%, rgba(199,162,87,0.06) 15%, rgba(199,162,87,0) 36%),
        radial-gradient(circle at 50% 100%, rgba(199,162,87,0.08) 0%, rgba(199,162,87,0.03) 16%, rgba(199,162,87,0) 40%);
      filter: blur(10px);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 12%, rgba(0,0,0,0) 88%, rgba(176,140,66,0.04) 100%);
    }

    .shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
    }

    .panel {
      width: 100%;
      max-width: 620px;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(251,249,244,0.96) 100%);
      border: 1px solid rgba(199,162,87,0.22);
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(199,162,87,0.10),
        0 0 28px rgba(199,162,87,0.12),
        0 0 70px rgba(199,162,87,0.06),
        0 35px 90px rgba(0, 0, 0, 0.10),
        0 2px 0 rgba(255,255,255,0.92) inset,
        0 -24px 42px rgba(176,140,66,0.04) inset;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(199,162,87,0.11) 0%, rgba(199,162,87,0.04) 16%, rgba(199,162,87,0) 38%),
        linear-gradient(180deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0) 24%);
      z-index: 0;
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 28px;
      pointer-events: none;
      border: 1px solid rgba(199,162,87,0.16);
      box-shadow:
        0 0 24px rgba(199,162,87,0.10),
        0 0 56px rgba(199,162,87,0.04);
      z-index: 0;
    }

    .panel-header,
    .content,
    .footer-note {
      position: relative;
      z-index: 1;
    }

    .panel-header {
      padding: 42px 30px 26px;
      text-align: center;
      border-bottom: 1px solid rgba(199,162,87,0.12);
      background:
        radial-gradient(circle at 50% -10%, rgba(199,162,87,0.20) 0%, rgba(199,162,87,0.08) 18%, rgba(199,162,87,0) 44%),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.88) 0%, rgba(255,255,255,0.48) 24%, rgba(255,255,255,0) 58%),
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(251,249,244,0.88) 100%);
    }

    .header-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .crest {
      display: block;
      width: 130px;
      max-width: 130px;
      height: auto;
      object-fit: contain;
      margin: 0 auto 0;
      filter:
        drop-shadow(0 14px 24px rgba(199,162,87,0.18))
        drop-shadow(0 0 18px rgba(199,162,87,0.10));
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: min(100%, 520px);
      margin: 0 auto 2px;
    }

    .brand-lockup::before,
    .brand-lockup::after {
      content: "";
      flex: 1;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(199,162,87,0), rgba(199,162,87,0.95), rgba(199,162,87,0));
      box-shadow: 0 0 12px rgba(199,162,87,0.12);
    }

    .eyebrow {
      color: var(--gold);
      font-size: 18px;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }

    h1 {
      margin: 0;
      font-family: "Cinzel", serif;
      font-weight: 600;
      color: var(--text);
      font-size: clamp(32px, 5.4vw, 52px);
      line-height: 1.06;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }

    .subtext {
      max-width: 470px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .content {
      padding: 28px;
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.90) 0%, rgba(251,249,244,0.88) 100%);
      border: 1px solid rgba(199,162,87,0.11);
      border-radius: 22px;
      padding: 26px;
      box-shadow:
        0 16px 30px rgba(0, 0, 0, 0.04),
        0 1px 0 rgba(255,255,255,0.85) inset,
        0 -8px 18px rgba(176,140,66,0.02) inset;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 0%, rgba(199,162,87,0.04) 0%, rgba(199,162,87,0.015) 18%, rgba(199,162,87,0) 46%);
    }

    .form-group + .form-group {
      margin-top: 16px;
    }

    label {
      display: block;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(199,162,87,0.12);
      border-radius: 14px;
      color: var(--text);
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      appearance: none;
      font-family: "Lato", sans-serif;
      box-shadow: 0 1px 0 rgba(255,255,255,0.65) inset;
    }

    input::placeholder {
      color: #9a958d;
    }

    input:focus {
      border-color: rgba(199,162,87,0.55);
      box-shadow:
        0 0 0 3px rgba(199,162,87,0.08),
        0 1px 0 rgba(255,255,255,0.72) inset;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button, .back-link {
      min-height: 50px;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: none;
      font-family: "Lato", sans-serif;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    button:hover,
    .back-link:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .primary-btn {
      background: linear-gradient(180deg, #d8ba73, #b8934c);
      color: #111315;
      font-weight: 700;
      box-shadow:
        0 10px 24px rgba(199,162,87,0.18),
        0 1px 0 rgba(255,255,255,0.45) inset;
    }

    .primary-btn:hover {
      box-shadow:
        0 14px 28px rgba(199,162,87,0.22),
        0 1px 0 rgba(255,255,255,0.45) inset;
      filter: brightness(1.02);
    }

    .back-link {
      background: #fff;
      color: var(--text);
      border: 1px solid rgba(199,162,87,0.12);
      box-shadow: none;
    }

    .status-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 14px;
      line-height: 1.8;
      border: 1px solid rgba(199,162,87,0.16);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      white-space: pre-wrap;
      display: none;
      font-size: 14px;
    }

    .status-show {
      display: block;
    }

    .status-success {
      color: var(--success);
      border-color: rgba(79,143,99,0.18);
      background: linear-gradient(180deg, rgba(79,143,99,0.10) 0%, rgba(79,143,99,0.06) 100%);
    }

    .status-error {
      color: var(--error);
      border-color: rgba(179,83,83,0.18);
      background: linear-gradient(180deg, rgba(179,83,83,0.10) 0%, rgba(179,83,83,0.06) 100%);
    }

    .footer-note {
      padding: 0 28px 30px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .button-row {
        flex-direction: column;
      }

      button, .back-link {
        width: 100%;
      }

      .panel-header {
        padding: 32px 18px 22px;
      }

      .content {
        padding: 18px;
      }

      .card {
        padding: 18px;
      }

      .crest {
        width: 112px;
        max-width: 112px;
      }

      .eyebrow {
        font-size: 15px;
        letter-spacing: 2px;
      }

      h1 {
        font-size: 30px;
      }

      .brand-lockup {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="panel-header">
        <div class="header-lockup">
          <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" class="crest">
          <div class="brand-lockup">
            <div class="eyebrow">The Ready Mark</div>
          </div>
        </div>

        <h1>Reset Password</h1>

        <div class="subtext">
          Create a new password for your Ready Mark guest account.
        </div>
      </div>

      <div class="content">
        <div class="card">
          <form id="reset-password-form" novalidate>
            <div class="form-group">
              <label for="new-password">New Password</label>
              <input
                id="new-password"
                type="password"
                placeholder="Enter a new password"
                autocomplete="new-password"
                required
              >
            </div>

            <div class="form-group">
              <label for="confirm-password">Confirm New Password</label>
              <input
                id="confirm-password"
                type="password"
                placeholder="Confirm your new password"
                autocomplete="new-password"
                required
              >
            </div>

            <div class="button-row">
              <button id="reset-password-btn" class="primary-btn" type="submit">Update Password</button>
              <a class="back-link" href="https://verify.thereadymarkgroup.com">Back to Verification Home</a>
            </div>
          </form>

          <div id="status-box" class="status-box" aria-live="polite"></div>
        </div>
      </div>

      <div class="footer-note">
        The Ready Mark verification system is designed to provide visible, documented proof of inspection readiness.
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("reset-password-form");
    const submitBtn = document.getElementById("reset-password-btn");
    const newPasswordInput = document.getElementById("new-password");
    const confirmPasswordInput = document.getElementById("confirm-password");
    const statusBox = document.getElementById("status-box");

    function setStatus(message, type = "") {
      statusBox.className = "status-box status-show";
      if (type === "success") statusBox.classList.add("status-success");
      if (type === "error") statusBox.classList.add("status-error");
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status-box";
      statusBox.textContent = "";
    }

    function setSubmitting(isSubmitting) {
      submitBtn.disabled = isSubmitting;
      submitBtn.textContent = isSubmitting ? "Updating..." : "Update Password";
    }

    function getResetToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token") || "";
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      clearStatus();

      const token = getResetToken();
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!token) {
        setStatus("This reset link is missing a token.", "error");
        return;
      }

      if (!newPassword || !confirmPassword) {
        setStatus("Please complete both password fields.", "error");
        return;
      }

      if (newPassword.length < 6) {
        setStatus("Password must be at least 6 characters.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        setStatus("Passwords do not match.", "error");
        return;
      }

      setSubmitting(true);

      try {
        const res = await fetch("/api/guest-reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            token,
            password: newPassword
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(
            data?.error ||
            data?.message ||
            data?.details?.message ||
            "Unable to reset password."
          );
        }

        try {
          const cleanUrl = new URL(window.location.href);
          cleanUrl.searchParams.delete("token");
          window.history.replaceState({}, document.title, cleanUrl.pathname + cleanUrl.search);
        } catch (err) {}

        form.reset();
        setStatus(
          "Password updated successfully. You can now return to the verification portal and log in with your new password.",
          "success"
        );
      } catch (error) {
        setStatus(error.message || "Unable to reset password.", "error");
      } finally {
        setSubmitting(false);
      }
    });
  </script>
</body>
</html>
