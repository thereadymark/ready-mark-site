<script>
const SESSION_TOKEN_KEY = "readymark_admin_token";

let loadedProperty = null;
let loadedRooms = [];

function getSessionToken() {
  return sessionStorage.getItem(SESSION_TOKEN_KEY) || "";
}

function clearSessionToken() {
  sessionStorage.removeItem(SESSION_TOKEN_KEY);
}

function requireAdminToken() {
  const token = getSessionToken();
  if (!token) {
    alert("Unauthorized. Please sign in.");
    window.location.href = "/admin.html";
    throw new Error("Missing token");
  }
  return token;
}

function adminHeaders(extra = {}) {
  return {
    "x-admin-token": getSessionToken(),
    ...extra
  };
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

async function fetchJson(url, options = {}) {
  const res = await fetch(url, options);
  const data = await res.json().catch(() => null);
  return { res, data };
}

function handleUnauthorized(res, data) {
  if (res.status === 401) {
    clearSessionToken();
    alert("Session expired. Please log in again.");
    window.location.href = "/admin.html";
    return true;
  }
  return false;
}

/* -------------------- LOAD PROPERTIES -------------------- */

async function loadProperties() {
  requireAdminToken();

  const select = document.getElementById("propertySelect");
  const resultBox = document.getElementById("resultBox");

  try {
    const { res, data } = await fetchJson("/api/list-properties", {
      headers: adminHeaders()
    });

    if (handleUnauthorized(res, data)) return;

    if (!res.ok) throw new Error(data?.error);

    select.innerHTML = '<option value="">Select a property</option>';

    data.properties.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = `${p.property_name} (${p.property_slug})`;
      select.appendChild(opt);
    });

    resultBox.textContent = "Properties loaded.";
  } catch (err) {
    resultBox.textContent = `Error: ${err.message}`;
  }
}

/* -------------------- LOAD ROOMS -------------------- */

async function loadPropertyRooms() {
  requireAdminToken();

  const propertyId = document.getElementById("propertySelect").value;
  const resultBox = document.getElementById("resultBox");
  const statusLine = document.getElementById("statusLine");
  const downloadBtn = document.getElementById("downloadZipBtn");

  if (!propertyId) {
    resultBox.textContent = "Select a property.";
    return;
  }

  resultBox.textContent = "Loading rooms...";
  statusLine.textContent = "";
  downloadBtn.disabled = true;

  try {
    const { res, data } = await fetchJson(
      `/api/property-rooms?propertyId=${encodeURIComponent(propertyId)}`,
      { headers: adminHeaders() }
    );

    if (handleUnauthorized(res, data)) return;

    if (!res.ok) throw new Error(data?.error);

    loadedProperty = data.property;
    loadedRooms = data.rooms || [];

    resultBox.innerHTML = `
<strong>Property Loaded</strong><br>
${escapeHtml(loadedProperty.property_name)}<br>
Rooms: ${loadedRooms.length}
    `;

    if (loadedRooms.length) {
      downloadBtn.disabled = false;
      statusLine.textContent = `${loadedRooms.length} QR codes ready`;
    } else {
      statusLine.textContent = "No QR codes found.";
    }
  } catch (err) {
    resultBox.textContent = err.message;
  }
}

/* -------------------- DOWNLOAD ZIP -------------------- */

async function downloadPropertyZip() {
  requireAdminToken();

  const statusLine = document.getElementById("statusLine");
  const downloadBtn = document.getElementById("downloadZipBtn");

  if (!loadedRooms.length) {
    statusLine.textContent = "No rooms loaded.";
    return;
  }

  downloadBtn.disabled = true;
  statusLine.textContent = "Generating ZIP...";

  try {
    const zip = new JSZip();

    /* 🔥 PARALLEL FETCH (faster) */
    const fetches = loadedRooms.map(async (room) => {
      const url = `https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(room.qr_url)}`;
      const res = await fetch(url);

      if (!res.ok) throw new Error(`QR failed: ${room.room_number}`);

      const blob = await res.blob();
      zip.file(`qr-${room.qr_slug}.png`, blob);
    });

    await Promise.all(fetches);

    const zipBlob = await zip.generateAsync({ type: "blob" });
    const downloadUrl = URL.createObjectURL(zipBlob);

    const link = document.createElement("a");
    link.href = downloadUrl;
    link.download = `${loadedProperty.property_slug}-qr-codes.zip`;
    link.click();

    setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);

    statusLine.textContent = "Download complete.";
  } catch (err) {
    statusLine.textContent = `Error: ${err.message}`;
  } finally {
    downloadBtn.disabled = false;
  }
}

/* -------------------- INIT -------------------- */

document.getElementById("loadRoomsBtn").onclick = loadPropertyRooms;
document.getElementById("downloadZipBtn").onclick = downloadPropertyZip;

loadProperties();
</script>
