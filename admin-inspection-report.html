<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Inspection Report</title>

<style>

body{
font-family:sans-serif;
padding:40px;
background:#f7f7f5;
}

.card{
background:white;
padding:30px;
border-radius:20px;
max-width:900px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
margin-top:0;
}

.label{
font-size:12px;
color:#666;
text-transform:uppercase;
}

.value{
font-size:18px;
margin-bottom:25px;
}

</style>

</head>

<body>

<div class="card">

<h1>Inspection Record</h1>

<div id="content">
Loading...
</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

const token =
sessionStorage.getItem("rm_admin_token");

async function load(){

const res =
await fetch(
`/api/admin-inspection-report?id=${id}`,
{
headers:{
"x-admin-token":token
}
}
);

const data =
await res.json();

document.getElementById("content")
.innerHTML = `

<div class="label">Property</div>
<div class="value">
${data.property_name || "-"}
</div>

<div class="label">Room</div>
<div class="value">
${data.room_number || "-"}
</div>

<div class="label">Verification ID</div>
<div class="value">
${data.verification_id || "-"}
</div>

<div class="label">Tier</div>
<div class="value">
${data.certification_tier || "-"}
</div>

<div class="label">Score</div>
<div class="value">
${data.score || "-"}
</div>

<div class="label">Inspector</div>
<div class="value">
${data.inspector_id || "-"}
</div>

<div class="label">Notes</div>
<div class="value">
${data.notes || "No notes"}
</div>

<div class="label">Inspection Date</div>
<div class="value">
${new Date(data.inspection_date)
.toLocaleString()}
</div>

`;

}

load();

</script>

</body>
</html>
