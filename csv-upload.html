<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Room Upload V2 | The Ready Mark</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0f172a;
      color: #f8f5ee;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .shell {
      width: 100%;
      max-width: 920px;
      background: linear-gradient(145deg, #1c2740, #141c2f);
      border: 2px solid #c9a34a;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 42px;
      color: #f8f5ee;
    }

    p {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #d4af57;
      font-weight: bold;
    }

    select,
    input[type="file"],
    button,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 18px;
    }

    select,
    input[type="file"],
    textarea {
      background: #f8f5ee;
      color: #111827;
    }

    button {
      background: #d4af57;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .result {
      margin-top: 14px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,87,0.25);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .note-box {
      margin-bottom: 18px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,87,0.18);
      color: #d1d5db;
      line-height: 1.7;
    }

    .good {
      color: #86efac;
      font-weight: bold;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-row button {
      flex: 1 1 260px;
      margin-bottom: 0;
    }

    .small-status {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="shell">
    <h1>CSV Room Upload V2</h1>
    <p>Upload a CSV file with room numbers, create them in bulk, and download QR codes as a ZIP.</p>

    <div class="note-box">
      Accepted formats:
      <br><br>
      <span class="good">Option 1:</span>
      <br>
      room_number
      <br>
      101
      <br>
      102
      <br>
      103
      <br><br>
      <span class="good">Option 2:</span>
      <br>
      101
      <br>
      102
      <br>
      103
    </div>

    <label for="propertySelect">Property</label>
    <select id="propertySelect">
      <option value="">Loading properties...</option>
    </select>

    <label for="csvFile">Upload CSV File</label>
    <input id="csvFile" type="file" accept=".csv,text/csv" />

    <label for="previewBox">Preview Parsed Room Numbers</label>
    <textarea id="previewBox" readonly placeholder="Parsed room numbers will appear here..."></textarea>

    <div class="action-row">
      <button id="parseCsvBtn" type="button">Parse CSV</button>
      <button id="uploadCsvBtn" type="button">Create Rooms from CSV</button>
      <button id="downloadZipBtn" type="button" disabled>Download All QR Codes ZIP</button>
    </div>

    <div class="small-status" id="zipStatus"></div>

    <div class="result" id="resultBox">Ready.</div>
  </div>

  <script>
    const SESSION_TOKEN_KEY = "readymark_admin_token";

    const propertySelect = document.getElementById("propertySelect");
    const csvFileInput = document.getElementById("csvFile");
    const previewBox = document.getElementById("previewBox");
    const parseCsvBtn = document.getElementById("parseCsvBtn");
    const uploadCsvBtn = document.getElementById("uploadCsvBtn");
    const downloadZipBtn = document.getElementById("downloadZipBtn");
    const zipStatus = document.getElementById("zipStatus");
    const resultBox = document.getElementById("resultBox");

    let parsedRoomNumbers = [];
    let latestCreatedRooms = [];
    let latestSelectedProperty = null;

    function getSessionToken() {
      return sessionStorage.getItem(SESSION_TOKEN_KEY) || "";
    }

    function clearSessionToken() {
      sessionStorage.removeItem(SESSION_TOKEN_KEY);
    }

    function adminHeaders(extra = {}) {
      return {
        "x-admin-token": getSessionToken(),
        ...extra
      };
    }

    function requireAdminToken() {
      const token = getSessionToken();
      if (!token) {
        alert("Unauthorized. Please sign in through admin.html first.");
        throw new Error("Missing admin session token");
      }
      return token;
    }

    function handleUnauthorizedResponse(response, data) {
      if (response.status === 401 || data?.error === "Unauthorized") {
        clearSessionToken();
        alert("Your admin session expired. Please sign in again through admin.html.");
        window.location.href = "/admin.html";
        return true;
      }
      return false;
    }

    function setResult(message) {
      resultBox.textContent = message;
    }

    function setResultHtml(html) {
      resultBox.innerHTML = html;
    }

    function sanitizeRoomNumber(value) {
      return String(value || "").trim();
    }

    function isValidRoomNumber(value) {
      return /^[a-zA-Z0-9-]+$/.test(value);
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => null);
      return { response, data };
    }

    async function loadProperties() {
      requireAdminToken();

      try {
        const { response, data } = await fetchJson("/api/list-properties", {
          method: "GET",
          headers: adminHeaders({
            "Accept": "application/json"
          })
        });

        if (handleUnauthorizedResponse(response, data)) {
          return;
        }

        if (!response.ok || data?.error) {
          throw new Error(data?.error || "Failed to load properties");
        }

        propertySelect.innerHTML = '<option value="">Select a property</option>';

        const properties = Array.isArray(data?.properties) ? data.properties : [];

        properties.forEach((property) => {
          const option = document.createElement("option");
          option.value = property.id;
          option.textContent = `${property.property_name} (${property.property_slug})`;
          option.dataset.propertyName = property.property_name || "";
          option.dataset.propertySlug = property.property_slug || "";
          propertySelect.appendChild(option);
        });

        setResult("Properties loaded.");
      } catch (err) {
        propertySelect.innerHTML = '<option value="">Could not load properties</option>';
        setResult(`Error loading properties: ${err.message}`);
      }
    }

    function parseCsvText(text) {
      const lines = String(text || "")
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      if (!lines.length) return [];

      const firstLine = lines[0].toLowerCase().replace(/"/g, "").trim();
      let dataLines = lines;

      if (
        firstLine === "room_number" ||
        firstLine === "room number" ||
        firstLine === "room"
      ) {
        dataLines = lines.slice(1);
      }

      const cleaned = dataLines
        .map((line) => {
          const firstCell = line.split(",")[0].replace(/"/g, "").trim();
          return sanitizeRoomNumber(firstCell);
        })
        .filter(Boolean)
        .filter(isValidRoomNumber);

      return [...new Set(cleaned)];
    }

    async function parseCsvFile() {
      const file = csvFileInput.files[0];

      if (!file) {
        setResult("Please choose a CSV file first.");
        return;
      }

      parseCsvBtn.disabled = true;
      setResult("Parsing CSV file...");

      try {
        const text = await file.text();
        parsedRoomNumbers = parseCsvText(text);

        if (!parsedRoomNumbers.length) {
          previewBox.value = "";
          latestCreatedRooms = [];
          downloadZipBtn.disabled = true;
          zipStatus.textContent = "";
          setResult("No valid room numbers found in the CSV.");
          return;
        }

        previewBox.value = parsedRoomNumbers.join("\n");
        latestCreatedRooms = [];
        downloadZipBtn.disabled = true;
        zipStatus.textContent = "";
        setResult(`Parsed ${parsedRoomNumbers.length} unique room numbers successfully.`);
      } catch (err) {
        previewBox.value = "";
        setResult(`Error parsing CSV: ${err.message}`);
      } finally {
        parseCsvBtn.disabled = false;
      }
    }

    async function uploadParsedRooms() {
      requireAdminToken();

      const propertyId = propertySelect.value;
      const selectedOption = propertySelect.options[propertySelect.selectedIndex];

      if (!propertyId) {
        setResult("Please choose a property.");
        return;
      }

      if (!parsedRoomNumbers.length) {
        setResult("Please parse a CSV file first.");
        return;
      }

      latestSelectedProperty = {
        id: propertyId,
        property_name: selectedOption?.dataset?.propertyName || "",
        property_slug: selectedOption?.dataset?.propertySlug || ""
      };

      uploadCsvBtn.disabled = true;
      downloadZipBtn.disabled = true;
      zipStatus.textContent = "";
      setResult("Creating rooms from CSV...");
      latestCreatedRooms = [];

      try {
        const { response, data } = await fetchJson("/api/bulk-create-rooms", {
          method: "POST",
          headers: adminHeaders({
            "Content-Type": "application/json",
            "Accept": "application/json"
          }),
          body: JSON.stringify({
            propertyId,
            roomNumbers: parsedRoomNumbers
          })
        });

        if (handleUnauthorizedResponse(response, data)) {
          return;
        }

        if (!response.ok || data?.error) {
          throw new Error(data?.error || "CSV room creation failed");
        }

        latestCreatedRooms = Array.isArray(data?.created)
          ? data.created
          : Array.isArray(data?.createdRooms)
          ? data.createdRooms
          : [];

        const skippedRooms = Array.isArray(data?.skipped) ? data.skipped : [];
        const createdCount = latestCreatedRooms.length;
        const skippedCount = skippedRooms.length;

        setResultHtml(`
<strong>CSV upload complete.</strong>

Created: ${createdCount}
Skipped (already existed): ${skippedCount}

${createdCount ? `Created Rooms:
${latestCreatedRooms.map((room) => `- Room ${room.room_number} → ${room.qr_slug}`).join("\n")}` : ""}

${skippedCount ? `Skipped Rooms:
${skippedRooms.map((room) => `- ${room}`).join("\n")}` : ""}
        `);

        if (createdCount > 0) {
          downloadZipBtn.disabled = false;
          zipStatus.textContent = `${createdCount} QR codes are ready to zip.`;
        } else {
          zipStatus.textContent = "No new rooms were created, so there are no new QR codes to zip.";
        }
      } catch (err) {
        setResult(`Error: ${err.message}`);
      } finally {
        uploadCsvBtn.disabled = false;
      }
    }

    function buildReadmeContent(property, rooms) {
      return [
        "THE READY MARK - CSV ROOM UPLOAD ZIP",
        "",
        `Property: ${property?.property_name || "Unknown"}`,
        `Property Slug: ${property?.property_slug || "Unknown"}`,
        `New QR Codes Included: ${rooms.length}`,
        "",
        "Contents:",
        "- PNG QR files for newly created rooms",
        "- room-index.csv with room number, slug, and URL",
        "",
        "Generated by The Ready Mark CSV Room Upload tool."
      ].join("\n");
    }

    function buildCsvContent(rooms) {
      const header = ["room_number", "qr_slug", "qr_url"];
      const rows = rooms.map((room) => [
        `"${String(room.room_number || "").replaceAll('"', '""')}"`,
        `"${String(room.qr_slug || "").replaceAll('"', '""')}"`,
        `"${String(room.qr_url || "").replaceAll('"', '""')}"`
      ]);

      return [header.join(","), ...rows.map((row) => row.join(","))].join("\n");
    }

    async function downloadQrZip() {
      if (!latestCreatedRooms.length) {
        zipStatus.textContent = "No newly created rooms available for ZIP download.";
        return;
      }

      downloadZipBtn.disabled = true;
      zipStatus.textContent = "Building ZIP file...";

      try {
        const zip = new JSZip();

        await Promise.all(
          latestCreatedRooms.map(async (room) => {
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(room.qr_url)}`;
            const response = await fetch(qrApiUrl);

            if (!response.ok) {
              throw new Error(`Failed to fetch QR for room ${room.room_number}`);
            }

            const blob = await response.blob();
            zip.file(`qr-${room.qr_slug}.png`, blob);
          })
        );

        zip.file("room-index.csv", buildCsvContent(latestCreatedRooms));
        zip.file("README.txt", buildReadmeContent(latestSelectedProperty, latestCreatedRooms));

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const downloadUrl = URL.createObjectURL(zipBlob);

        const link = document.createElement("a");
        link.href = downloadUrl;
        link.download = `${latestSelectedProperty?.property_slug || "ready-mark"}-new-room-qr-codes.zip`;
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);
        zipStatus.textContent = "ZIP downloaded successfully.";
      } catch (err) {
        zipStatus.textContent = `ZIP error: ${err.message}`;
      } finally {
        downloadZipBtn.disabled = false;
      }
    }

    parseCsvBtn.addEventListener("click", parseCsvFile);
    uploadCsvBtn.addEventListener("click", uploadParsedRooms);
    downloadZipBtn.addEventListener("click", downloadQrZip);

    try {
      loadProperties();
    } catch (error) {
      setResult(`Error: ${error.message}`);
    }
  </script>
</body>
</html>
