<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | The Ready Mark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Arial,sans-serif;background:linear-gradient(180deg,#fbfaf6,#f6f2ea);color:#171717}
    .card{width:100%;max-width:520px;background:linear-gradient(180deg,#fffdf8,#f3eadb);border:1px solid rgba(227,211,170,.85);border-radius:28px;box-shadow:0 28px 80px rgba(17,19,21,.10);padding:34px 28px;text-align:center}
    img{width:100px;margin-bottom:18px;filter:drop-shadow(0 16px 22px rgba(0,0,0,.18))}
    .eyebrow{color:#9d7b34;text-transform:uppercase;letter-spacing:4px;font-size:12px;font-weight:900;margin-bottom:8px}
    h1{font-family:Georgia,serif;font-weight:500;font-size:34px;margin:0 0 10px;text-transform:uppercase}
    p{color:#6f6a61;line-height:1.7;font-size:14px}
    label{display:block;text-align:left;margin:18px 0 8px;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:900;color:#6f6a61}
    input{width:100%;padding:14px 15px;border-radius:14px;border:1px solid rgba(199,162,87,.26);background:rgba(255,255,255,.82);font-size:15px}
    button{width:100%;margin-top:20px;min-height:48px;border:0;border-radius:14px;background:linear-gradient(180deg,#d8ba73,#b8934c);color:#171717;font-weight:900;cursor:pointer;font-size:15px}
    button:disabled{opacity:.65}
    a{display:inline-block;margin-top:18px;color:#9d7b34;font-weight:800;text-decoration:none;font-size:13px}
    .status{display:none;margin-top:18px;padding:14px;border-radius:14px;font-size:14px;line-height:1.6;text-align:left}
    .status.info{display:block;color:#6f6a61;background:rgba(255,255,255,.64);border:1px solid #e3d3aa}
    .status.success{display:block;color:#2f8f57;background:rgba(47,143,87,.08);border:1px solid rgba(47,143,87,.22)}
    .status.error{display:block;color:#b44c4c;background:rgba(180,76,76,.08);border:1px solid rgba(180,76,76,.22)}
  </style>
</head>
<body>
  <div class="card">
    <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" />
    <div class="eyebrow">The Ready Mark</div>
    <h1>Forgot Password</h1>
    <p>Enter your guest account email and we’ll send a secure password reset link.</p>

    <label for="email">Email Address</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@email.com" />

    <button id="send-btn" type="button">Send Reset Link</button>
    <a id="back-link" href="/guest-login.html">Back to Guest Login</a>

    <div id="status-box" class="status"></div>
  </div>

  <script>
    const REQUEST_RESET_API = "/api/guest-forgot-password";
    const params = new URLSearchParams(window.location.search);
    const redirectTarget = params.get("redirect") || "/";

    const emailInput = document.getElementById("email");
    const sendBtn = document.getElementById("send-btn");
    const statusBox = document.getElementById("status-box");

    document.getElementById("back-link").href =
      `/guest-login.html?redirect=${encodeURIComponent(redirectTarget)}`;

    function showStatus(message, type = "info") {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    async function sendResetLink() {
      const email = emailInput.value.trim().toLowerCase();

      if (!email) {
        showStatus("Please enter your email address.", "error");
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";
      showStatus("Sending password reset link...", "info");

      try {
        const res = await fetch(REQUEST_RESET_API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(data?.error || "Unable to send reset link.");
        }

        showStatus(data?.message || "If an account exists for this email, a reset link has been sent.", "success");
      } catch (error) {
        showStatus(error.message || "Unable to send reset link.", "error");
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send Reset Link";
      }
    }

    sendBtn.addEventListener("click", sendResetLink);
    emailInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") sendResetLink();
    });
  </script>
</body>
</html>
