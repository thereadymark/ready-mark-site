<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account | The Ready Mark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#fbfaf6,#f6f2ea);
      color:#171717;
    }

    .card {
      width:100%;
      max-width:520px;
      background:linear-gradient(180deg,#fffdf8,#f3eadb);
      border:1px solid rgba(227,211,170,.85);
      border-radius:28px;
      box-shadow:0 28px 80px rgba(17,19,21,.10);
      padding:34px 28px;
      text-align:center;
    }

    img {
      width:100px;
      margin-bottom:18px;
    }

    .eyebrow {
      color:#9d7b34;
      text-transform:uppercase;
      letter-spacing:4px;
      font-size:12px;
      font-weight:900;
      margin-bottom:8px;
    }

    h1 {
      font-family:Georgia,serif;
      font-size:34px;
      margin:0 0 10px;
      text-transform:uppercase;
    }

    p {
      color:#6f6a61;
      font-size:14px;
      margin-bottom:20px;
    }

    label {
      display:block;
      text-align:left;
      margin:16px 0 8px;
      font-size:12px;
      text-transform:uppercase;
      font-weight:900;
      color:#6f6a61;
    }

    input {
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(199,162,87,.26);
      background:#fff;
      font-size:15px;
    }

    .password-field {
      position:relative;
    }

    .password-field input {
      padding-right:50px;
    }

    .toggle-password {
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      border:none;
      background:none;
      cursor:pointer;
      font-size:16px;
    }

    button {
      width:100%;
      margin-top:20px;
      padding:14px;
      border-radius:14px;
      border:none;
      background:linear-gradient(180deg,#d8ba73,#b8934c);
      font-weight:900;
      cursor:pointer;
    }

    .status {
      margin-top:16px;
      padding:12px;
      border-radius:12px;
      display:none;
    }

    .status.error { background:#f8d7da; color:#721c24; display:block; }
    .status.success { background:#d4edda; color:#155724; display:block; }
  </style>
</head>

<body>
  <div class="card">
    <img src="/readymarkseal(best)nobackground.PNG" />
    <div class="eyebrow">The Ready Mark</div>
    <h1>Create Account</h1>

    <p>Create a guest account to report issues.</p>

    <label>Email</label>
    <input id="email" type="email" placeholder="you@email.com" />

    <label>Password</label>
    <div class="password-field">
      <input id="password" type="password" />
      <button type="button" class="toggle-password" data-target="password">👁</button>
    </div>

    <label>Confirm Password</label>
    <div class="password-field">
      <input id="confirm-password" type="password" />
      <button type="button" class="toggle-password" data-target="confirm-password">👁</button>
    </div>

    <button id="signup-btn">Create Account</button>

    <div id="status" class="status"></div>
  </div>

<script>
const API = "/api/guest-signup";

const email = document.getElementById("email");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirm-password");
const status = document.getElementById("status");

function show(msg,type){
  status.className="status "+type;
  status.textContent=msg;
}

document.querySelectorAll(".toggle-password").forEach(btn=>{
  btn.onclick=()=>{
    const input=document.getElementById(btn.dataset.target);
    input.type=input.type==="password"?"text":"password";
  };
});

document.getElementById("signup-btn").onclick=async()=>{
  if(password.value!==confirmPassword.value){
    show("Passwords do not match","error");
    return;
  }

  const res = await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(!res.ok){
    show(data.error || "Signup failed","error");
    return;
  }

  show("Account created. Check your email for verification code.","success");
};
</script>
</body>
</html>
