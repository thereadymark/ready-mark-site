<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Log Inspection | Ready Mark</title>

<style>
body {
  font-family: Georgia, serif;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.card {
  max-width:600px;
  margin:auto;
  background:#1c2740;
  padding:24px;
  border-radius:12px;
  border:2px solid #c9a34a;
}

input, select, textarea, button {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:6px;
  border:none;
}

button {
  background:#d4af57;
  font-weight:bold;
  cursor:pointer;
}

button:disabled {
  opacity:0.6;
  cursor:not-allowed;
}

.result {
  margin-top:15px;
}
</style>
</head>
<body>

<div class="card">
<h2>Log Inspection</h2>

<select id="propertySelect"></select>
<select id="roomSelect"></select>

<input id="score" placeholder="Score (0-100)" />

<select id="status">
<option value="">Select Status</option>
<option>Ready Mark Premier</option>
<option>Verified Clean</option>
<option>Needs Attention</option>
<option>Not Clean</option>
</select>

<input id="inspector" placeholder="Inspector Name" />
<textarea id="notes" placeholder="Notes"></textarea>

<button id="submitBtn">Submit Inspection</button>

<div class="result" id="result"></div>
</div>

<script>
const SESSION_TOKEN_KEY = "readymark_admin_token";

const propertySelect = document.getElementById("propertySelect");
const roomSelect = document.getElementById("roomSelect");
const submitBtn = document.getElementById("submitBtn");
const resultBox = document.getElementById("result");

function getToken() {
  return sessionStorage.getItem(SESSION_TOKEN_KEY) || "";
}

function clearToken() {
  sessionStorage.removeItem(SESSION_TOKEN_KEY);
}

function requireAuth() {
  const token = getToken();
  if (!token) {
    alert("Please login via admin.html");
    throw new Error("Unauthorized");
  }
  return token;
}

function authHeaders(extra = {}) {
  return {
    "x-admin-token": getToken(),
    ...extra
  };
}

function handleAuthFail(res, data) {
  if (res.status === 401 || data?.error === "Unauthorized") {
    clearToken();
    alert("Session expired. Please login again.");
    window.location.href = "/admin.html";
    return true;
  }
  return false;
}

function setResult(msg) {
  resultBox.innerHTML = msg;
}

async function fetchJson(url, options = {}) {
  const res = await fetch(url, options);
  const data = await res.json().catch(() => null);
  return { res, data };
}

/* =========================
   LOAD PROPERTIES
========================= */
async function loadProperties() {
  requireAuth();

  try {
    const { res, data } = await fetchJson("/api/list-properties", {
      headers: authHeaders()
    });

    if (handleAuthFail(res, data)) return;

    if (!res.ok) throw new Error(data?.error || "Failed to load properties");

    propertySelect.innerHTML = `<option value="">Select Property</option>`;

    data.properties.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.property_name;
      propertySelect.appendChild(opt);
    });

  } catch (err) {
    setResult(`Error loading properties: ${err.message}`);
  }
}

/* =========================
   LOAD ROOMS
========================= */
async function loadRooms(propertyId) {
  if (!propertyId) return;

  try {
    const { res, data } = await fetchJson(`/api/property-rooms?propertyId=${propertyId}`, {
      headers: authHeaders()
    });

    if (handleAuthFail(res, data)) return;

    if (!res.ok) throw new Error(data?.error || "Failed to load rooms");

    roomSelect.innerHTML = `<option value="">Select Room</option>`;

    data.rooms.forEach(r => {
      const opt = document.createElement("option");
      opt.value = r.id;
      opt.textContent = r.room_number;
      roomSelect.appendChild(opt);
    });

  } catch (err) {
    setResult(`Error loading rooms: ${err.message}`);
  }
}

propertySelect.addEventListener("change", (e) => {
  roomSelect.innerHTML = `<option>Loading...</option>`;
  loadRooms(e.target.value);
});

/* =========================
   SUBMIT INSPECTION
========================= */
async function submitInspection() {
  requireAuth();

  const roomId = roomSelect.value;
  const scoreRaw = document.getElementById("score").value.trim();
  const status = document.getElementById("status").value;
  const inspector = document.getElementById("inspector").value.trim();
  const notes = document.getElementById("notes").value.trim();

  /* VALIDATION */
  if (!roomId) return setResult("Please select a room.");
  if (!scoreRaw) return setResult("Score is required.");

  const score = Number(scoreRaw);

  if (isNaN(score) || score < 0 || score > 100) {
    return setResult("Score must be a number between 0 and 100.");
  }

  if (!status) return setResult("Please select a status.");
  if (!inspector) return setResult("Inspector name is required.");

  submitBtn.disabled = true;
  setResult("Submitting inspection...");

  try {
    const { res, data } = await fetchJson("/api/create-inspection", {
      method: "POST",
      headers: authHeaders({
        "Content-Type": "application/json"
      }),
      body: JSON.stringify({
        roomId,
        score,
        status,
        inspector,
        notes
      })
    });

    if (handleAuthFail(res, data)) return;

    if (!res.ok) {
      throw new Error(data?.error || "Failed to log inspection");
    }

    setResult("Inspection Logged ✅");

    // optional reset
    document.getElementById("score").value = "";
    document.getElementById("status").value = "";
    document.getElementById("notes").value = "";

  } catch (err) {
    setResult(`Error: ${err.message}`);
  } finally {
    submitBtn.disabled = false;
  }
}

submitBtn.addEventListener("click", submitInspection);

/* =========================
   INIT
========================= */
try {
  loadProperties();
} catch (err) {
  setResult(`Error: ${err.message}`);
}
</script>

</body>
</html>
