<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Report an Issue | The Ready Mark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(199,162,87,0.16), transparent 34%),
        linear-gradient(180deg, #fbfaf6 0%, #f6f2ea 100%);
      color: #111315;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 42px 18px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(199,162,87,0.4);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(17,19,21,0.1);
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 34px 28px 22px;
      border-bottom: 1px solid #e8dfca;
    }

    .logo {
      width: 82px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 34px;
      font-weight: 500;
      letter-spacing: 1.4px;
    }

    .sub {
      margin: 10px auto 0;
      color: #6f6a61;
      line-height: 1.7;
      max-width: 560px;
      font-size: 14px;
    }

    .body {
      padding: 28px;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-size: 12px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      font-weight: 700;
      color: #6f6a61;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #e1d4b8;
      border-radius: 14px;
      padding: 14px 15px;
      font-size: 15px;
      background: #fff;
      color: #111315;
      outline: none;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #c7a257;
      box-shadow: 0 0 0 3px rgba(199,162,87,0.14);
    }

    .btn {
      width: 100%;
      margin-top: 22px;
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      cursor: pointer;
      background: linear-gradient(180deg, #d8ba73, #b8934c);
      color: #111315;
      font-weight: 800;
      font-size: 15px;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .note {
      margin-top: 16px;
      color: #7c7468;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .status {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .status.success {
      display: block;
      color: #2f8f57;
      background: rgba(47,143,87,0.08);
      border: 1px solid rgba(47,143,87,0.22);
    }

    .status.error {
      display: block;
      color: #b44c4c;
      background: rgba(180,76,76,0.08);
      border: 1px solid rgba(180,76,76,0.22);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #9d7b34;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="/" class="back-link">← Back to Portal</a>

    <div class="card">
      <div class="header">
        <img src="/readymarkseal(best)nobackground.PNG" class="logo" alt="The Ready Mark" />
        <h1>Report an Issue</h1>
        <p class="sub">
          Use this form to notify The Ready Mark of a cleanliness or room-readiness concern tied to a verified property or room.
        </p>
      </div>

      <div class="body">
        <label for="property-slug">Property Slug</label>
        <input id="property-slug" placeholder="example-property-slug" />

        <label for="room-number">Room Number</label>
        <input id="room-number" placeholder="Example: 204" />

        <label for="reservation-last-name">Reservation Last Name</label>
        <input id="reservation-last-name" placeholder="Guest last name" />

        <label for="issue-type">Issue Type</label>
        <select id="issue-type">
          <option value="">Select an issue type</option>
          <option>Cleanliness Concern</option>
          <option>Bathroom Issue</option>
          <option>Bedding / Linen Issue</option>
          <option>Odor Concern</option>
          <option>Damage or Maintenance Concern</option>
          <option>Other</option>
        </select>

        <label for="guest-note">Details</label>
        <textarea id="guest-note" placeholder="Briefly describe the concern."></textarea>

        <button class="btn" id="submit-btn" type="button">Submit Issue</button>

        <div class="note">
          This report is used to help verify and resolve room-readiness concerns. For emergencies, contact the property directly.
        </div>

        <div id="status-box" class="status"></div>
      </div>
    </div>
  </div>

 <script>
  const API_URL = "/api/report-issue";

  const params = new URLSearchParams(window.location.search);
  const currentPath = window.location.pathname + window.location.search;

  const statusBox = document.getElementById("status-box");
  const submitBtn = document.getElementById("submit-btn");

  const guestToken = localStorage.getItem("readymark_guest_token");
  const guestEmail = localStorage.getItem("readymark_guest_email");

  if (!guestToken) {
    window.location.href = `/guest-login.html?redirect=${encodeURIComponent(currentPath)}`;
  }

  function showStatus(message, type) {
    statusBox.className = "status " + type;
    statusBox.textContent = message;
  }

  // Auto-fill from verification page URL
  const propertyParam = params.get("property_slug") || params.get("property");
  const roomParam = params.get("room_number") || params.get("room");

  if (propertyParam) {
    document.getElementById("property-slug").value = propertyParam.trim().toLowerCase();
  }

  if (roomParam) {
    document.getElementById("room-number").value = roomParam.trim();
  }

  if (guestEmail) {
    showStatus(`Signed in as ${guestEmail}. You may submit your cleanliness report below.`, "success");
  }

  submitBtn.addEventListener("click", async () => {
    const latestGuestToken = localStorage.getItem("readymark_guest_token");

    if (!latestGuestToken) {
      window.location.href = `/guest-login.html?redirect=${encodeURIComponent(currentPath)}`;
      return;
    }

    const property_slug = document.getElementById("property-slug").value.trim().toLowerCase();
    const room_number = document.getElementById("room-number").value.trim();
    const reservation_last_name = document.getElementById("reservation-last-name").value.trim();
    const issue_type = document.getElementById("issue-type").value;
    const guest_note = document.getElementById("guest-note").value.trim();

    if (!property_slug || !room_number || !issue_type || !guest_note) {
      showStatus("Please complete the property, room, issue type, and details.", "error");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json",
          "x-guest-token": latestGuestToken
        },
        body: JSON.stringify({
          property_slug,
          room_number,
          reservation_last_name,
          issue_types: [issue_type],
          guest_note
        })
      });

      const data = await res.json().catch(() => null);

      if (!res.ok || data?.error) {
        throw new Error(data?.error || "Unable to submit issue.");
      }

      showStatus("Issue submitted successfully. Thank you.", "success");

      document.getElementById("reservation-last-name").value = "";
      document.getElementById("issue-type").value = "";
      document.getElementById("guest-note").value = "";
    } catch (error) {
      showStatus(error.message || "Unable to submit issue.", "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Issue";
    }
  });
</script>
</body>
</html>
