<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ready Mark Print Sheet</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #0f172a;
  color: white;
}

.controls {
  padding: 20px;
  text-align: center;
}

button, select {
  padding: 12px;
  margin: 10px;
  border-radius: 6px;
  border: none;
}

button {
  background: #d4af57;
  font-weight: bold;
  cursor: pointer;
}

.sheet {
  width: 8.5in;
  height: 11in;
  background: white;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: 2in;
  gap: 0.1in;
  padding: 0.4in;
  box-sizing: border-box;
}

.label {
  width: 6in;
  height: 2in;
  background: #0f172a;
  color: #f8f5ee;
  border: 2px solid #d4af57;
  padding: 10px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.top {
  text-align: center;
  font-size: 11px;
  color: #d4af57;
}

.main {
  text-align: center;
  font-size: 16px;
  font-weight: bold;
}

.sub {
  text-align: center;
  font-size: 10px;
  color: #ccc;
}

.qr {
  text-align: center;
}

.qr img {
  width: 70px;
}

.bottom {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
}

@media print {
  body {
    background: white;
  }

  .controls {
    display: none;
  }

  .sheet {
    margin: 0;
    page-break-after: always;
  }
}
</style>
</head>

<body>

<div class="controls">
  <h2>Print QR Seal Sheet</h2>

  <select id="propertySelect"></select>
  <button onclick="loadRooms()">Load Rooms</button>
  <button onclick="window.print()">Print Sheet</button>
</div>

<div id="sheetContainer"></div>

<script>
async function loadProperties() {
  const res = await fetch("/api/list-properties");
  const data = await res.json();

  const select = document.getElementById("propertySelect");
  select.innerHTML = "<option>Select Property</option>";

  data.properties.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.property_name;
    select.appendChild(opt);
  });
}

async function loadRooms() {
  const propertyId = document.getElementById("propertySelect").value;

  const res = await fetch(`/api/property-rooms?propertyId=${propertyId}`);
  const data = await res.json();

  renderSheets(data.rooms);
}

function renderSheets(rooms) {
  const container = document.getElementById("sheetContainer");
  container.innerHTML = "";

  for (let i = 0; i < rooms.length; i += 6) {
    const sheet = document.createElement("div");
    sheet.className = "sheet";

    const chunk = rooms.slice(i, i + 6);

    chunk.forEach(room => {
      const label = document.createElement("div");
      label.className = "label";

      label.innerHTML = `
        <div class="top">
          THE READY MARK<br>
          Official Cleanliness Seal
        </div>

        <div class="main">
          Verified Clean. Sealed for Your Stay.
        </div>

        <div class="sub">
          Scan to verify cleanliness
        </div>

        <div class="qr">
          <img src="${room.qr_url}" />
        </div>

        <div class="bottom">
          <span>Broken seal = Not verified</span>
          <span>Not all rooms are verified</span>
        </div>
      `;

      sheet.appendChild(label);
    });

    container.appendChild(sheet);
  }
}

loadProperties();
</script>

</body>
</html>
