<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guest Login | The Ready Mark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg:#f6f2ea;
      --paper:#fffdf8;
      --paper2:#f3eadb;
      --text:#171717;
      --muted:#6f6a61;
      --gold:#c7a257;
      --gold-dark:#9d7b34;
      --line:#e3d3aa;
      --danger:#b44c4c;
      --success:#2f8f57;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial,sans-serif;
      background:
        radial-gradient(circle at top, rgba(199,162,87,0.16), transparent 34%),
        linear-gradient(180deg,#fbfaf6 0%,var(--bg) 100%);
      color:var(--text);
    }

    .card {
      width:100%;
      max-width:520px;
      background:linear-gradient(180deg,var(--paper),var(--paper2));
      border:1px solid rgba(227,211,170,0.85);
      border-radius:28px;
      box-shadow:
        0 28px 80px rgba(17,19,21,0.10),
        inset 0 0 0 1px rgba(199,162,87,0.18);
      padding:34px 28px;
      text-align:center;
    }

    .logo {
      width:105px;
      margin-bottom:18px;
      filter:
        drop-shadow(0 16px 22px rgba(0,0,0,0.18))
        drop-shadow(0 0 20px rgba(199,162,87,0.25));
    }

    .eyebrow {
      color:var(--gold-dark);
      text-transform:uppercase;
      letter-spacing:4px;
      font-size:12px;
      font-weight:900;
      margin-bottom:8px;
    }

    h1 {
      font-family:Georgia,serif;
      font-weight:500;
      font-size:34px;
      margin:0 0 10px;
      text-transform:uppercase;
    }

    .sub {
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
      margin:0 0 24px;
    }

    label {
      display:block;
      text-align:left;
      margin:16px 0 8px;
      font-size:12px;
      letter-spacing:1px;
      text-transform:uppercase;
      font-weight:900;
      color:var(--muted);
    }

    input {
      width:100%;
      padding:14px 15px;
      border-radius:14px;
      border:1px solid rgba(199,162,87,0.26);
      background:rgba(255,255,255,0.82);
      font-size:15px;
      outline:none;
    }

    input:focus {
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(199,162,87,0.12);
    }

    .btn {
      width:100%;
      margin-top:20px;
      min-height:48px;
      border:0;
      border-radius:14px;
      background:linear-gradient(180deg,#d8ba73,#b8934c);
      color:#171717;
      font-weight:900;
      cursor:pointer;
      font-size:15px;
    }

    .btn:disabled {
      opacity:.65;
      cursor:not-allowed;
    }

    .links {
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      font-size:13px;
    }

    .links a {
      color:var(--gold-dark);
      font-weight:800;
      text-decoration:none;
    }

    .status {
      display:none;
      margin-top:18px;
      padding:14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.6;
      text-align:left;
    }

    .status.info {
      display:block;
      color:var(--muted);
      background:rgba(255,255,255,0.64);
      border:1px solid var(--line);
    }

    .status.success {
      display:block;
      color:var(--success);
      background:rgba(47,143,87,0.08);
      border:1px solid rgba(47,143,87,0.22);
    }

    .status.error {
      display:block;
      color:var(--danger);
      background:rgba(180,76,76,0.08);
      border:1px solid rgba(180,76,76,0.22);
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="/readymarkseal(best)nobackground.PNG" class="logo" alt="The Ready Mark" />

    <div class="eyebrow">The Ready Mark</div>
    <h1>Guest Access</h1>

    <p class="sub">
      Sign in to report a cleanliness issue tied to this room verification record.
    </p>

    <label for="email">Email Address</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@email.com" />

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="Enter your password" />

    <button id="login-btn" class="btn" type="button">Continue</button>

    <div class="links">
      <a href="/guest-signup.html" id="signup-link">Create account</a>
      <a href="/guest-reset-password.html" id="reset-link">Forgot password?</a>
    </div>

    <div id="status-box" class="status"></div>
  </div>

  <script>
    const LOGIN_API = "/api/guest-login";

    const params = new URLSearchParams(window.location.search);
    const redirectTarget = params.get("redirect") || "/";

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("login-btn");
    const statusBox = document.getElementById("status-box");

    function showStatus(message, type = "info") {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    function safeRedirect(url) {
      if (!url || typeof url !== "string") return "/";
      if (url.startsWith("http://") || url.startsWith("https://")) return "/";
      return url;
    }

    async function loginGuest() {
      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      if (!email || !password) {
        showStatus("Please enter your email and password.", "error");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Checking...";
      showStatus("Checking guest access...", "info");

      try {
        const res = await fetch(LOGIN_API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(data?.error || "Unable to sign in.");
        }

        if (!data.email_verified) {
          localStorage.setItem("readymark_pending_guest_email", email);
          showStatus(
            data.message || "Please verify your email before continuing. Check your email for the verification code.",
            "info"
          );
          return;
        }

        if (!data.token) {
          throw new Error("Login succeeded, but no guest session token was returned.");
        }

        localStorage.setItem("readymark_guest_token", data.token);
        localStorage.setItem("readymark_guest_email", data.guest?.email || email);
        localStorage.setItem("readymark_guest_name", `${data.guest?.first_name || ""} ${data.guest?.last_name || ""}`.trim());

        showStatus("Signed in. Redirecting...", "success");

        window.location.href = safeRedirect(redirectTarget);
      } catch (error) {
        showStatus(error.message || "Unable to sign in.", "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Continue";
      }
    }

    loginBtn.addEventListener("click", loginGuest);

    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        loginGuest();
      }
    });

    emailInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        passwordInput.focus();
      }
    });

    document.getElementById("signup-link").href =
      `/guest-signup.html?redirect=${encodeURIComponent(redirectTarget)}`;

    document.getElementById("reset-link").href =
      `/guest-reset-password.html?redirect=${encodeURIComponent(redirectTarget)}`;
  </script>
</body>
</html>
