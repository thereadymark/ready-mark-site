<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Ready Mark</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
      margin: 0;
      padding: 40px 20px;
    }

    .form-container {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }

    .section-title {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: 600;
    }

    .divider {
      width: 70px;
      height: 2px;
      background: gold;
      margin: 0 auto 25px;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }

    button {
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 20px;
      font-weight: 600;
    }

    #qr-preview {
      margin-top: 20px;
      text-align: center;
    }

    #qr-preview img {
      max-width: 220px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2 class="section-title">Property Details</h2>
    <div class="divider"></div>

    <input type="hidden" id="property_id" />

    <input type="text" id="name" placeholder="Property Name" />

    <select id="property_type">
      <option value="">Select Property Type</option>
      <option value="hotel">Hotel</option>
      <option value="apartment">Apartment</option>
      <option value="office">Office</option>
      <option value="bank">Bank</option>
      <option value="medical">Medical</option>
      <option value="dental">Dental</option>
    </select>

    <input type="text" id="address" placeholder="Address" />
    <input type="text" id="city" placeholder="City" />
    <input type="text" id="state" placeholder="State" />
    <input type="text" id="zip" placeholder="ZIP Code" />

    <h2 class="section-title">Uploads</h2>
    <div class="divider"></div>

    <label for="images">Photos</label>
    <input type="file" id="images" multiple />

    <label for="documents">Documents</label>
    <input type="file" id="documents" multiple />

    <button id="save-property-btn">Save Property</button>

    <div id="status"></div>
    <div id="qr-preview"></div>
  </div>

  <script src="/upload-evidence.js"></script>
  <script>
    document.getElementById('save-property-btn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      const qrPreview = document.getElementById('qr-preview');

      status.textContent = 'Saving property...';
      qrPreview.innerHTML = '';

      try {
        const propertyId = document.getElementById('property_id').value.trim();

        const payload = {
          id: propertyId || null,
          name: document.getElementById('name').value.trim(),
          property_type: document.getElementById('property_type').value,
          address: document.getElementById('address').value.trim(),
          city: document.getElementById('city').value.trim(),
          state: document.getElementById('state').value.trim(),
          zip: document.getElementById('zip').value.trim()
        };

        const propertyRes = await fetch('/api/create-property', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const propertyData = await propertyRes.json();

        if (!propertyRes.ok) {
          throw new Error(propertyData.error || 'Failed to save property');
        }

        const savedProperty = propertyData.property;
        document.getElementById('property_id').value = savedProperty.id;

        const imageFiles = document.getElementById('images').files;
        const docFiles = document.getElementById('documents').files;

        if (window.uploadEvidence) {
          await window.uploadEvidence(savedProperty.id, imageFiles, docFiles);
        }

        if (savedProperty.qr_code) {
          qrPreview.innerHTML = `
            <p>QR Code Generated:</p>
            <img src="${savedProperty.qr_code}" alt="QR Code" />
          `;
        }

        status.textContent = 'Property saved successfully.';
      } catch (error) {
        console.error(error);
        status.textContent = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
