<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Retired | The Ready Mark</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      font-family: Georgia, serif;
      background: #121416;
      color: #f3eee5;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: linear-gradient(180deg, rgba(27,31,35,0.98), rgba(21,24,27,0.98));
      border: 1px solid rgba(199,162,87,0.22);
      border-radius: 22px;
      padding: 32px 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 38px;
      color: #f3eee5;
    }

    p {
      margin: 0;
      font-size: 17px;
      line-height: 1.8;
      color: #b7b0a5;
    }

    a {
      display: inline-block;
      margin-top: 22px;
      padding: 14px 20px;
      border-radius: 14px;
      text-decoration: none;
      background: linear-gradient(180deg, #d8ba73, #b8934c);
      color: #111315;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Page Retired</h1>
    <p>
      This property creation page has been retired. Please use the internal admin dashboard for property management.
    </p>
    <a href="/admin.html">Go to Admin Dashboard</a>
  </div>
</body>
</html>
