<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ready Mark Verification Portal</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-63GYLY26HQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-63GYLY26HQ');
  </script>

  <style>
    :root {
      --bg: #121416;
      --panel: rgba(26, 30, 34, 0.96);
      --gold: #c7a257;
      --gold-soft: #d8bb7a;
      --text: #f3eee5;
      --muted: #b7b0a5;
      --line: rgba(199, 162, 87, 0.20);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);

      --verified: #3ddc84;
      --attention: #ffb347;
      --notclean: #ff6b6b;
      --premier: #f4d06f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.03), transparent 28%),
        linear-gradient(180deg, #1b1815 0%, #121416 45%, #121416 100%);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("/readymarklogonobackground2.PNG");
      background-repeat: repeat;
      background-size: 180px;
      opacity: 0.025;
      filter: grayscale(100%) brightness(1.05);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 42%, rgba(0,0,0,0.22) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 34px 18px;
    }

    .panel {
      width: 100%;
      max-width: 820px;
      background: linear-gradient(180deg, rgba(27,31,35,0.98), rgba(21,24,27,0.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(199,162,87,0.08), transparent 40%);
      pointer-events: none;
    }

    .panel-header {
      padding: 38px 26px 24px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 1;
    }

    .crest {
      width: 130px;
      display: block;
      margin: 0 auto 12px;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 16px;
      max-width: 680px;
    }

    .brand-lockup::before,
    .brand-lockup::after {
      content: "";
      flex: 1;
      height: 2px;
      background: linear-gradient(
        90deg,
        rgba(199,162,87,0),
        rgba(216,187,122,0.95),
        rgba(199,162,87,0)
      );
      box-shadow: 0 0 8px rgba(199,162,87,0.18);
      border-radius: 999px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.04;
    }

    .subtext {
      max-width: 590px;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .content {
      padding: 26px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: linear-gradient(180deg, rgba(35,39,44,0.88), rgba(25,29,33,0.95));
      border: 1px solid rgba(199,162,87,0.16);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .form-group + .form-group {
      margin-top: 16px;
    }

    label {
      display: block;
      margin-bottom: 9px;
      color: var(--gold-soft);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(199,162,87,0.14);
      border-radius: 14px;
      color: var(--text);
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      appearance: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: Georgia, serif;
    }

    input::placeholder,
    textarea::placeholder {
      color: #8e877b;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(199,162,87,0.40);
      box-shadow: 0 0 0 3px rgba(199,162,87,0.08);
    }

    input[type="checkbox"] {
      appearance: auto !important;
      -webkit-appearance: checkbox !important;
      width: 18px !important;
      height: 18px !important;
      margin: 0 !important;
      accent-color: #c7a257;
    }

    option {
      background: #1b1f23;
      color: var(--text);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      min-height: 50px;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
    }

    .primary-btn {
      background: linear-gradient(180deg, #d8ba73, #b8934c);
      color: #111315;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(199,162,87,0.22);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border: 1px solid rgba(199,162,87,0.16);
    }

    .portal-link {
      text-align: center;
      margin-top: 16px;
    }

    .portal-link a {
      color: var(--gold-soft);
      text-decoration: none;
      font-size: 14px;
    }

    .portal-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 12px 20px;
      margin-top: 14px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid rgba(199,162,87,0.20);
      background: rgba(199,162,87,0.08);
      color: var(--gold-soft);
    }

    .status-verified {
      color: var(--verified);
      border-color: rgba(61,220,132,0.35);
      background: rgba(61,220,132,0.08);
      box-shadow: 0 0 12px rgba(61, 220, 132, 0.20);
    }

    .status-attention {
      color: var(--attention);
      border-color: rgba(255,179,71,0.35);
      background: rgba(255,179,71,0.08);
    }

    .status-notclean {
      color: var(--notclean);
      border-color: rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.08);
    }

    .status-premier {
      color: var(--premier);
      border-color: rgba(244,208,111,0.35);
      background: rgba(244,208,111,0.08);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .info-item {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(199,162,87,0.10);
    }

    .info-label {
      color: var(--gold-soft);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 18px;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 36px);
      line-height: 1.1;
    }

    .centered-title {
      text-align: center;
    }

    .section-divider {
      width: 120px;
      height: 2px;
      margin: 0 auto 18px;
      background: linear-gradient(90deg, rgba(199,162,87,0), rgba(216,187,122,0.95), rgba(199,162,87,0));
      box-shadow: 0 0 10px rgba(199,162,87,0.20);
      border-radius: 999px;
    }

    .verification-proof {
      position: relative;
      min-height: 320px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(199,162,87,0.16);
      background:
        linear-gradient(rgba(15,18,20,0.12), rgba(15,18,20,0.18));
    }

    .proof-video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background:
        linear-gradient(rgba(15,18,20,0.12), rgba(15,18,20,0.18));
    }

    .proof-video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .below-video {
      margin-top: 20px;
      padding: 6px 6px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .proof-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: var(--text);
    }

    .proof-icon {
      font-size: 18px;
      line-height: 1;
      margin-top: 2px;
    }

    .proof-step strong {
      display: block;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .proof-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .guest-report-intro {
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
      text-align: center;
      margin-bottom: 14px;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      margin-top: 12px;
    }

    .checkbox-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(199,162,87,0.14);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      font-size: 15px;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      margin-bottom: 0;
    }

    .inline-status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.6;
      border: 1px solid rgba(199,162,87,0.16);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      white-space: pre-wrap;
    }

    .inline-success {
      border-color: rgba(61,220,132,0.35);
      background: rgba(61,220,132,0.08);
      color: #dff7ea;
    }

    .inline-error {
      border-color: rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.08);
      color: #ffe0e0;
    }

    .hidden {
      display: none !important;
    }

    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .auth-modal {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, rgba(27,31,35,0.99), rgba(21,24,27,0.99));
      border: 1px solid rgba(199,162,87,0.20);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px;
      position: relative;
    }

    .auth-title {
      text-align: center;
      margin: 0 0 8px;
      font-size: 32px;
      color: var(--text);
    }

    .auth-subtext {
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
      font-size: 15px;
    }

    .auth-switch {
      text-align: center;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .auth-switch a {
      color: var(--gold-soft);
      text-decoration: none;
      cursor: pointer;
    }

    .auth-guest-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(61,220,132,0.08);
      border: 1px solid rgba(61,220,132,0.30);
      color: #dff7ea;
      font-size: 14px;
      margin: 0 auto 18px;
    }

    .guest-auth-wrap {
      text-align: center;
      margin-bottom: 16px;
    }

    .auth-policy-text {
      margin-top: 12px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.6;
    }

    .auth-policy-text a {
      color: var(--gold);
      text-decoration: none;
    }

    .footer-note {
      padding: 0 26px 28px;
      text-align: center;
      color: #958d82;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .panel-header,
      .content {
        padding-left: 20px;
        padding-right: 20px;
      }

      .info-grid,
      .checkbox-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      h1 {
        font-size: 32px;
      }

      .eyebrow {
        font-size: 16px;
      }

      .brand-lockup {
        gap: 8px;
        margin-bottom: 14px;
      }

      .crest {
        width: 120px;
      }

      .verification-proof {
        min-height: 280px;
      }

      .auth-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const PROPERTY_OPTIONS = [
      { value: "", label: "Select a property" },
      { value: "crown-plaza-hotel-stl", label: "Crown Plaza Hotel STL" }
    ];

    const YOUTUBE_EMBED_URL = "https://www.youtube.com/embed/s2mYUVarGx0?rel=0";

    let currentGuest = null;
    let currentGuestToken = sessionStorage.getItem("readymark_guest_token") || "";

    function getStatusClass(tier) {
      if (!tier) return "";
      const normalized = tier.toLowerCase().trim();

      if (normalized === "verified clean") return "status-verified";
      if (normalized === "needs attention") return "status-attention";
      if (normalized === "not clean") return "status-notclean";
      if (normalized === "ready mark premier") return "status-premier";

      return "";
    }

    function escapeHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderPropertyOptions() {
      return PROPERTY_OPTIONS.map(
        option => `<option value="${escapeHtml(option.value)}">${escapeHtml(option.label)}</option>`
      ).join("");
    }

    function renderBrandLockup() {
      return `
        <div class="brand-lockup">
          <div class="eyebrow">The Ready Mark</div>
        </div>
      `;
    }

    function renderLandingPage() {
      const app = document.getElementById("app");
      app.innerHTML = `
        <div class="shell">
          <div class="panel">
            <div class="panel-header">
              <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" class="crest">
              ${renderBrandLockup()}
              <h1>Verification Portal</h1>
              <div class="subtext">
                Confirm the authenticity of a Ready Mark inspection record and access room-specific verification details.
              </div>
            </div>

            <div class="content">
              <div class="card">
                <div class="form-group">
                  <label for="property-search">Property</label>
                  <select id="property-search">
                    ${renderPropertyOptions()}
                  </select>
                </div>

                <div class="form-group">
                  <label for="room-search">Room Number</label>
                  <input id="room-search" type="text" placeholder="Enter room number, e.g. 102">
                </div>

                <div class="button-row">
                  <button id="verify-room-btn" class="primary-btn">Verify Room</button>
                </div>

                <div class="portal-note">
                  Each Ready Mark record is room-specific, time-stamped, and connected to a documented inspection process.
                </div>
              </div>

              <div class="portal-link">
                <a href="https://thereadymarkgroup.com">Return to Main Website</a>
              </div>
            </div>

            <div class="footer-note">
              The Ready Mark verification system is designed to provide visible, documented proof of inspection readiness.
            </div>
          </div>
        </div>
      `;

      const verifyBtn = document.getElementById("verify-room-btn");
      const roomInput = document.getElementById("room-search");
      const propertySelect = document.getElementById("property-search");

      function goToRoom() {
        const property = propertySelect.value;
        let room = roomInput.value.trim().toLowerCase();

        if (!property) {
          alert("Please select a property.");
          return;
        }

        if (!room) {
          alert("Please enter a room number.");
          return;
        }

        room = room.replace(/\s+/g, "");
        room = room.replace(/^room-?/i, "");

        if (!/^\d+$/.test(room)) {
          alert("Please enter a valid room number, like 102.");
          return;
        }

        window.location.href = `/${property}-room-${room}`;
      }

      verifyBtn.addEventListener("click", goToRoom);
      roomInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") goToRoom();
      });
    }

    async function verifyGuestSession() {
      if (!currentGuestToken) {
        currentGuest = null;
        return null;
      }

      try {
        const res = await fetch("/api/guest-verify-session", {
          method: "GET",
          headers: {
            "Accept": "application/json",
            "x-guest-token": currentGuestToken
          }
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          sessionStorage.removeItem("readymark_guest_token");
          currentGuestToken = "";
          currentGuest = null;
          return null;
        }

        currentGuest = data.guest;
        return currentGuest;
      } catch {
        currentGuest = null;
        return null;
      }
    }

    function renderAuthModal(type = "login") {
      const firstNameField = type === "signup" ? `
        <div class="form-group">
          <label for="guest-first-name">First Name</label>
          <input id="guest-first-name" type="text" placeholder="Enter your first name">
        </div>
      ` : "";

      const lastNameField = type === "signup" ? `
        <div class="form-group">
          <label for="guest-last-name">Last Name</label>
          <input id="guest-last-name" type="text" placeholder="Enter your last name">
        </div>
      ` : "";

      return `
        <div id="guest-auth-overlay" class="auth-overlay">
          <div class="auth-modal">
            <h2 class="auth-title">${type === "login" ? "Guest Login" : "Create Guest Account"}</h2>
            <div class="auth-subtext">
              Sign in to continue with a room-specific cleanliness report.
            </div>

            ${firstNameField}
            ${lastNameField}

            <div class="form-group">
              <label for="guest-email">${type === "login" ? "Email" : "Email Address"}</label>
              <input id="guest-email" type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
              <label for="guest-password">Password</label>
              <input id="guest-password" type="password" placeholder="Enter your password">
            </div>

            <div class="button-row">
              <button id="guest-auth-submit" class="primary-btn">${type === "login" ? "Continue" : "Create Account"}</button>
              <button id="guest-auth-cancel" class="secondary-btn" type="button">Cancel</button>
            </div>

            <p class="auth-policy-text">
              By continuing, you agree to our
              <a href="/privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>.
            </p>

            <div id="guest-auth-status" class="inline-status hidden"></div>

            <div class="auth-switch">
              ${type === "login"
                ? `Need an account? <a id="switch-to-signup">Create one here</a>`
                : `Already have an account? <a id="switch-to-login">Log in</a>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderEmailVerificationModal(email) {
      return `
        <div id="email-verify-overlay" class="auth-overlay">
          <div class="auth-modal">
            <h2 class="auth-title">Verify Your Email</h2>
            <div class="auth-subtext">
              We sent a 6-digit verification code to ${escapeHtml(email)}.
            </div>

            <div class="form-group">
              <label for="email-verification-code">Verification Code</label>
              <input id="email-verification-code" type="text" placeholder="Enter your 6-digit code">
            </div>

            <div class="button-row">
              <button id="email-verify-submit" class="primary-btn">Verify Email</button>
              <button id="email-verify-cancel" class="secondary-btn" type="button">Cancel</button>
            </div>

            <div id="email-verify-status" class="inline-status hidden"></div>
          </div>
        </div>
      `;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const result = reader.result || "";
          const base64 = String(result).split(",")[1];
          resolve(base64);
        };

        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function submitGuestReport(payload) {
      const res = await fetch("/api/create-report", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(
          typeof data.error === "string"
            ? data.error
            : data.details?.message
            ? data.details.message
            : JSON.stringify(data.error || data.details || data)
        );
      }

      return data;
    }

    function renderResultPage(data, slug) {
      const app = document.getElementById("app");

      const property = data.property || "—";
      const room = data.room || slug || "—";
      const inspectorId = data.inspectorId || "—";
      const verificationId = data.verificationId || "—";
      const propertySlug = data.property_slug || "";
      let inspectionDate = "—";

      if (data.inspectionDate) {
        try {
          inspectionDate = new Date(data.inspectionDate).toLocaleDateString();
        } catch {
          inspectionDate = data.inspectionDate;
        }
      }

      const certificationLevel = data.certificationTier || "Not verified";
      const score = data.score !== "" && data.score !== null && data.score !== undefined
        ? `${data.score} / 100`
        : "N/A";

      const statusClass = getStatusClass(certificationLevel);

      app.innerHTML = `
        <div class="shell">
          <div class="panel">
            <div class="panel-header">
              <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" class="crest">
              ${renderBrandLockup()}
              <h1>Verification Record</h1>
              <div class="status-pill ${statusClass}">
                ${escapeHtml(certificationLevel)}
              </div>
            </div>

            <div class="content">
              <div class="card">
                <div class="info-grid">
                  <div class="info-item">
                    <div class="info-label">Property</div>
                    <div class="info-value">${escapeHtml(property)}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Room</div>
                    <div class="info-value">${escapeHtml(room)}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Inspector ID</div>
                    <div class="info-value">${escapeHtml(inspectorId)}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Inspection Date</div>
                    <div class="info-value">${escapeHtml(inspectionDate)}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Certification Level</div>
                    <div class="info-value">${escapeHtml(certificationLevel)}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Verification Record ID</div>
                    <div class="info-value">${escapeHtml(verificationId)}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Inspection Score</div>
                    <div class="info-value">${escapeHtml(score)}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Status</div>
                    <div class="info-value">${escapeHtml(data.status || certificationLevel)}</div>
                  </div>
                </div>
              </div>

              <div class="card">
                <h2 class="section-title centered-title">How This Room Was Verified</h2>
                <div class="section-divider"></div>

                <div class="verification-proof">
                  <div class="proof-video-wrap">
                    <iframe
                      src="${YOUTUBE_EMBED_URL}"
                      title="Ready Mark Verification Process"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                      allowfullscreen>
                    </iframe>
                  </div>
                </div>

                <div class="below-video">
                  <div class="proof-step">
                    <div class="proof-icon">🧼</div>
                    <div>
                      <strong>Room Cleaned</strong>
                      <div class="proof-sub">
                        High-touch surfaces, linens, and guest areas were serviced according to Ready Mark standards.
                      </div>
                    </div>
                  </div>

                  <div class="proof-step">
                    <div class="proof-icon">🔍</div>
                    <div>
                      <strong>Inspected</strong>
                      <div class="proof-sub">
                        A room-specific inspection was completed and reviewed against the Ready Mark protocol.
                      </div>
                    </div>
                  </div>

                  <div class="proof-step">
                    <div class="proof-icon">✅</div>
                    <div>
                      <strong>Certified</strong>
                      <div class="proof-sub">
                        This verification record was logged, time-stamped, and connected to the room in our system.
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="card">
                <h2 class="section-title centered-title">Need Help With Room Cleanliness?</h2>
                <div class="section-divider"></div>
                <div class="guest-report-intro">
                  If something about this room’s cleanliness does not meet expectations, you can report it privately here for direct follow-up.
                </div>

                <div class="guest-auth-wrap">
                  <div id="guest-auth-chip-wrap"></div>
                </div>

                <div id="report-start-view">
                  <div class="button-row">
                    <button id="open-report-btn" class="primary-btn">Report an Issue</button>
                  </div>
                </div>

                <div id="report-form-view" class="hidden">
                  <div class="form-group">
                    <label>What’s the issue?</label>
                    <div class="checkbox-grid">
                      <label class="checkbox-option"><input type="checkbox" name="issue_type" value="Bathroom not clean">Bathroom not clean</label>
                      <label class="checkbox-option"><input type="checkbox" name="issue_type" value="Bed or linens issue">Bed or linens issue</label>
                      <label class="checkbox-option"><input type="checkbox" name="issue_type" value="Dust or surfaces">Dust or surfaces</label>
                      <label class="checkbox-option"><input type="checkbox" name="issue_type" value="Odor">Odor</label>
                      <label class="checkbox-option"><input type="checkbox" name="issue_type" value="Trash or leftover items">Trash or leftover items</label>
                      <label class="checkbox-option"><input type="checkbox" name="issue_type" value="Floor issue">Floor issue</label>
                      <label class="checkbox-option"><input type="checkbox" name="issue_type" value="Other">Other</label>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="guest-note">Anything else we should know?</label>
                    <textarea id="guest-note" placeholder="Optional details about the issue."></textarea>
                  </div>

                  <div class="form-group">
                    <label for="guest-photo">Add a Photo (Optional)</label>
                    <input id="guest-photo" type="file" accept="image/*">
                  </div>

                  <div class="button-row">
                    <button id="submit-report-btn" class="primary-btn">Send to Hotel &amp; Ready Mark</button>
                    <button id="cancel-report-btn" class="secondary-btn" type="button">Cancel</button>
                  </div>

                  <div id="report-status" class="inline-status hidden"></div>
                </div>
              </div>

              <div class="card">
                <div class="portal-note">
                  This room has been inspected under The Ready Mark Cleanliness Standard. High-touch surfaces, linens, bathrooms, and guest areas were reviewed according to the Ready Mark inspection protocol.
                </div>
              </div>

              <div class="portal-link">
                <a href="/privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
              </div>

              <div class="portal-link">
                <a href="https://verify.thereadymarkgroup.com">Back to Verification Home</a>
              </div>
            </div>

            <div class="footer-note">
              The Ready Mark verification system is designed to provide visible, documented proof of inspection readiness.
            </div>
          </div>
        </div>
      `;

      function renderGuestChip() {
        const wrap = document.getElementById("guest-auth-chip-wrap");
        if (!wrap) return;

        if (currentGuest && currentGuest.email_verified) {
          wrap.innerHTML = `
            <div class="auth-guest-chip">
              Signed in as ${escapeHtml(currentGuest.first_name)} ${escapeHtml(currentGuest.last_name)}
            </div>
          `;
        } else {
          wrap.innerHTML = "";
        }
      }

      function setInlineStatus(el, message, type = "") {
        el.className = "inline-status";
        if (type === "success") el.classList.add("inline-success");
        if (type === "error") el.classList.add("inline-error");
        el.textContent = message;
        el.classList.remove("hidden");
      }

      function clearInlineStatus(el) {
        el.className = "inline-status hidden";
        el.textContent = "";
      }

      function openEmailVerificationModal(email) {
        const existing = document.getElementById("email-verify-overlay");
        if (existing) existing.remove();

        document.body.insertAdjacentHTML("beforeend", renderEmailVerificationModal(email));

        const overlay = document.getElementById("email-verify-overlay");
        const submitBtn = document.getElementById("email-verify-submit");
        const cancelBtn = document.getElementById("email-verify-cancel");
        const statusBox = document.getElementById("email-verify-status");

        function closeModal() {
          if (overlay) overlay.remove();
        }

        cancelBtn.addEventListener("click", closeModal);

        submitBtn.addEventListener("click", async function () {
          const code = document.getElementById("email-verification-code").value.trim();

          if (!code) {
            setInlineStatus(statusBox, "Please enter the verification code.", "error");
            return;
          }

          setInlineStatus(statusBox, "Verifying email...");

          try {
            const res = await fetch("/api/verify-email", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
              },
              body: JSON.stringify({
                email,
                code
              })
            });

            const data = await res.json();

            if (!res.ok || data.error) {
              const friendlyError =
                typeof data.error === "string"
                  ? data.error
                  : data.error?.message
                  ? data.error.message
                  : data.details?.message
                  ? data.details.message
                  : JSON.stringify(data.error || data.details || data);

              throw new Error(friendlyError || "Unable to verify email.");
            }

            currentGuestToken = data.token;
            currentGuest = data.guest;
            sessionStorage.setItem("readymark_guest_token", currentGuestToken);

            closeModal();
            renderGuestChip();

            document.getElementById("report-start-view").classList.add("hidden");
            document.getElementById("report-form-view").classList.remove("hidden");
          } catch (error) {
            setInlineStatus(statusBox, error.message || "Unable to verify email.", "error");
          }
        });
      }

      function openAuthModal(type = "login") {
        const existing = document.getElementById("guest-auth-overlay");
        if (existing) existing.remove();

        document.body.insertAdjacentHTML("beforeend", renderAuthModal(type));

        const overlay = document.getElementById("guest-auth-overlay");
        const submitBtn = document.getElementById("guest-auth-submit");
        const cancelBtn = document.getElementById("guest-auth-cancel");
        const authStatus = document.getElementById("guest-auth-status");
        const switchToSignup = document.getElementById("switch-to-signup");
        const switchToLogin = document.getElementById("switch-to-login");

        function closeModal() {
          if (overlay) overlay.remove();
        }

        cancelBtn.addEventListener("click", closeModal);

        if (switchToSignup) {
          switchToSignup.addEventListener("click", function () {
            closeModal();
            openAuthModal("signup");
          });
        }

        if (switchToLogin) {
          switchToLogin.addEventListener("click", function () {
            closeModal();
            openAuthModal("login");
          });
        }

        submitBtn.addEventListener("click", async function () {
          authStatus.className = "inline-status";
          authStatus.textContent = type === "login" ? "Continuing..." : "Creating account...";
          authStatus.classList.remove("hidden");

          try {
            const email = document.getElementById("guest-email").value.trim();
            const password = document.getElementById("guest-password").value.trim();

            if (!email || !password) {
              throw new Error("Please complete email and password.");
            }

            let endpoint = "/api/guest-login";
            let payload = { email, password };

            if (type === "signup") {
              const firstName = document.getElementById("guest-first-name").value.trim();
              const lastName = document.getElementById("guest-last-name").value.trim();

              if (!firstName || !lastName) {
                throw new Error("Please complete first name and last name.");
              }

              endpoint = "/api/guest-signup";
              payload = {
                first_name: firstName,
                last_name: lastName,
                email,
                password
              };
            }

            const res = await fetch(endpoint, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
              },
              body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (!res.ok || data.error) {
              const friendlyError =
                typeof data.error === "string"
                  ? data.error
                  : data.error?.message
                  ? data.error.message
                  : data.details?.message
                  ? data.details.message
                  : JSON.stringify(data.error || data.details || data);

              throw new Error(friendlyError || "Unable to continue.");
            }

            closeModal();

            const resolvedEmail = data.email || email;
            openEmailVerificationModal(resolvedEmail);
          } catch (error) {
            setInlineStatus(authStatus, error.message || "Unable to continue.", "error");
          }
        });
      }

      renderGuestChip();

      const openReportBtn = document.getElementById("open-report-btn");
      const reportStartView = document.getElementById("report-start-view");
      const reportFormView = document.getElementById("report-form-view");
      const submitReportBtn = document.getElementById("submit-report-btn");
      const cancelReportBtn = document.getElementById("cancel-report-btn");
      const reportStatus = document.getElementById("report-status");

      openReportBtn.addEventListener("click", async function () {
        if (!currentGuest || !currentGuest.email_verified) {
          openAuthModal("login");
          return;
        }

        reportStartView.classList.add("hidden");
        reportFormView.classList.remove("hidden");
        clearInlineStatus(reportStatus);
      });

      cancelReportBtn.addEventListener("click", function () {
        reportFormView.classList.add("hidden");
        reportStartView.classList.remove("hidden");
        clearInlineStatus(reportStatus);
      });

      submitReportBtn.addEventListener("click", async function () {
        const checkedIssues = Array.from(document.querySelectorAll('input[name="issue_type"]:checked'))
          .map(input => input.value);

        const guestNote = document.getElementById("guest-note").value.trim();
        const guestPhoto = document.getElementById("guest-photo").files[0] || null;

        if (!checkedIssues.length) {
          setInlineStatus(reportStatus, "Please select at least one issue before submitting.", "error");
          return;
        }

        if (!currentGuestToken) {
          setInlineStatus(reportStatus, "Guest login required.", "error");
          return;
        }

        if (!currentGuest || !currentGuest.email_verified) {
          setInlineStatus(reportStatus, "Email verification required.", "error");
          return;
        }

        setInlineStatus(reportStatus, "Sending report...");

        try {
          const issueSummary = checkedIssues.join(", ");
          const guestName = `${currentGuest.first_name || ""} ${currentGuest.last_name || ""}`.trim();

          let detailsText = guestNote || "";
          if (guestPhoto) {
            detailsText = detailsText
              ? `${detailsText} | Photo attached: ${guestPhoto.name}`
              : `Photo attached: ${guestPhoto.name}`;
          }

          const responseData = await submitGuestReport({
            property: property,
            room: room,
            issue: issueSummary,
            details: detailsText,
            guest_name: guestName,
            guest_email: currentGuest.email
          });

          const confirmationNumber = responseData.confirmationNumber || "Pending";

          setInlineStatus(
            reportStatus,
            `Report received.\n\nReference #: ${confirmationNumber}\n\nThe property has been notified.`,
            "success"
          );

          document.querySelectorAll('input[name="issue_type"]').forEach(input => {
            input.checked = false;
          });

          document.getElementById("guest-note").value = "";
          document.getElementById("guest-photo").value = "";
        } catch (error) {
          setInlineStatus(reportStatus, error.message || "Unable to submit report.", "error");
        }
      });
    }

    function renderErrorPage(message, slug) {
      const app = document.getElementById("app");
      app.innerHTML = `
        <div class="shell">
          <div class="panel">
            <div class="panel-header">
              <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" class="crest">
              ${renderBrandLockup()}
              <h1>Verification Record</h1>
              <div class="status-pill status-notclean">Lookup Error</div>
            </div>

            <div class="content">
              <div class="card">
                <div class="info-grid">
                  <div class="info-item">
                    <div class="info-label">Requested Record</div>
                    <div class="info-value">${escapeHtml(slug || "—")}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Message</div>
                    <div class="info-value">${escapeHtml(message || "Unable to load verification record.")}</div>
                  </div>
                </div>
              </div>

              <div class="portal-link">
                <a href="https://verify.thereadymarkgroup.com">Back to Verification Home</a>
              </div>
            </div>

            <div class="footer-note">
              If this issue persists, please contact The Ready Mark for assistance.
            </div>
          </div>
        </div>
      `;
    }

    async function loadVerification(slug) {
      try {
        const res = await fetch("/api/get-verification?slug=" + encodeURIComponent(slug), {
          method: "GET",
          headers: { "Accept": "application/json" }
        });

        const data = await res.json();

        if (!res.ok || data?.error) {
          renderErrorPage(data?.error || "Verification record not found.", slug);
          return;
        }

        renderResultPage(data, slug);
      } catch (err) {
        renderErrorPage(err?.message || "Unexpected error.", slug);
      }
    }

    document.addEventListener("DOMContentLoaded", async function () {
      await verifyGuestSession();

      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const slug = pathParts[pathParts.length - 1] || null;

      const params = new URLSearchParams(window.location.search);
      const source = params.get("src") || "unknown";

      if (typeof gtag === "function") {
        gtag("event", "qr_scan", { source });
      }

      if (!slug) {
        renderLandingPage();
      } else {
        loadVerification(slug);
      }
    });
  </script>
</body>
</html>
