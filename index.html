<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ready Mark Verification Portal</title>

  <style>
    :root {
      --bg: #121416;
      --gold: #c7a257;
      --gold-soft: #d8bb7a;
      --text: #f3eee5;
      --muted: #b7b0a5;
      --line: rgba(199, 162, 87, 0.20);
      --verified: #3ddc84;
      --attention: #ffb347;
      --notclean: #ff6b6b;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      color: var(--text);
      background: #121416;
    }

    .shell {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .panel {
      width: 100%;
      max-width: 820px;
      background: #1a1e22;
      border-radius: 20px;
      border: 1px solid var(--line);
    }

    .panel-header {
      text-align: center;
      padding: 30px 20px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 10px 0;
    }

    .content {
      padding: 20px;
    }

    .card {
      background: #20252a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
    }

    .record-item {
      margin-bottom: 18px;
    }

    .record-label {
      font-size: 12px;
      color: var(--gold-soft);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .record-value {
      font-size: 20px;
    }

    .status-pill {
      margin-top: 12px;
      padding: 10px;
      border-radius: 999px;
      text-align: center;
      font-weight: bold;
      border: 1px solid var(--line);
    }

    .status-verified { color: var(--verified); }
    .status-attention { color: var(--attention); }
    .status-notclean { color: var(--notclean); }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #111;
      color: white;
      margin-top: 6px;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--gold);
      font-weight: bold;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 220px;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>

<body>
<div id="app"></div>

<script>
const PROPERTY_OPTIONS = [
  { value: "", label: "Select a property" },
  { value: "crown-plaza-hotel-stl", label: "Crown Plaza Hotel STL" }
];

const VIDEO = "https://www.youtube.com/embed/s2mYUVarGx0";

function getStatusClass(tier) {
  if (!tier) return "";
  tier = tier.toLowerCase();

  if (tier.includes("verified")) return "status-verified";
  if (tier.includes("attention")) return "status-attention";
  if (tier.includes("not")) return "status-notclean";
  return "";
}

function renderHome() {
  app.innerHTML = `
    <div class="shell">
      <div class="panel">
        <div class="panel-header">
          <h1>Verification Portal</h1>
        </div>

        <div class="content">
          <div class="card">
            <label>Property</label>
            <select id="prop">
              ${PROPERTY_OPTIONS.map(p =>
                `<option value="${p.value}">${p.label}</option>`
              ).join("")}
            </select>

            <label>Room</label>
            <input id="room" placeholder="e.g. 102"/>

            <button onclick="go()">Verify Room</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function go() {
  const p = document.getElementById("prop").value;
  const r = document.getElementById("room").value;

  if (!p || !r) return alert("Fill both fields");

  location.href = `/${p}-room-${r}`;
}

function renderResult(d) {
  app.innerHTML = `
    <div class="shell">
      <div class="panel">
        <div class="panel-header">
          <h1>Verification Record</h1>
          <div class="status-pill ${getStatusClass(d.certificationTier)}">
            ${d.certificationTier || "Not Verified"}
          </div>
        </div>

        <div class="content">

          <div class="card">
            ${row("Property", d.property)}
            ${row("Room", d.room)}
            ${row("Inspector", d.inspectorId)}
            ${row("Date", d.inspectionDate)}
            ${row("Score", d.score)}
            ${row("Record ID", d.verificationId)}
          </div>

          <div class="card">
            <iframe src="${VIDEO}" allowfullscreen></iframe>
          </div>

        </div>
      </div>
    </div>
  `;
}

function row(label, value) {
  return `
    <div class="record-item">
      <div class="record-label">${label}</div>
      <div class="record-value">${value || "-"}</div>
    </div>
  `;
}

async function load(slug) {
  try {
    const r = await fetch("/api/get-verification?slug=" + slug);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    renderResult(d);
  } catch (e) {
    app.innerHTML = "<h2 style='padding:20px'>Not found</h2>";
  }
}

const path = location.pathname.split("/").filter(Boolean).pop();

if (!path) {
  renderHome();
} else {
  load(path);
}
</script>

</body>
</html>
