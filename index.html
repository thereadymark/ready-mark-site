<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ready Mark | Verification</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-63GYLY26HQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-63GYLY26HQ');
  </script>

  <style>
    :root {
      --bg: #080808;
      --bg-soft: #101010;
      --panel: rgba(12, 12, 12, 0.92);
      --panel-2: rgba(18, 18, 18, 0.92);
      --gold: #c9a34a;
      --gold-soft: #d4af57;
      --white: #f8f5ee;
      --muted: #cfc7b6;
      --line: rgba(255, 255, 255, 0.08);
      --green: #3ddc84;
      --orange: #ffb347;
      --red: #ff6b6b;
      --premier: #f4d06f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: Georgia, serif;
    }

    body {
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.015), transparent 25%, transparent 75%, rgba(255,255,255,0.015));
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("/readymarklogonobackground2.PNG");
      background-repeat: repeat;
      background-size: 240px;
      opacity: 0.035;
      filter: grayscale(100%) brightness(1.1);
      pointer-events: none;
      z-index: 0;
    }

    .page-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .card {
      position: relative;
      width: min(100%, 760px);
      background:
        linear-gradient(145deg, rgba(18,18,18,0.96), rgba(10,10,10,0.96));
      border: 2px solid var(--gold);
      border-radius: 22px;
      padding: 44px 28px 32px;
      box-shadow:
        0 16px 50px rgba(0, 0, 0, 0.45),
        0 0 24px rgba(201, 163, 74, 0.10);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("/readymarkseal(best)nobackground.PNG");
      background-repeat: no-repeat;
      background-position: center 42%;
      background-size: 360px;
      opacity: 0.045;
      filter: grayscale(100%) brightness(1.15);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .brand {
      text-align: center;
      font-size: 15px;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(40px, 7vw, 64px);
      line-height: 1;
      color: var(--white);
    }

    .subtitle {
      text-align: center;
      color: var(--gold-soft);
      font-size: clamp(18px, 3vw, 26px);
      letter-spacing: 1px;
      margin: 20px auto 34px;
      padding: 18px 0;
      position: relative;
      width: fit-content;
      min-width: 260px;
    }

    .subtitle::before,
    .subtitle::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(440px, 88%);
      height: 2px;
      background: var(--gold-soft);
      box-shadow: 0 0 8px rgba(212, 175, 87, 0.22);
    }

    .subtitle::before { top: 0; }
    .subtitle::after { bottom: 0; }

    .rows {
      margin-top: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .label {
      color: var(--muted);
      font-size: clamp(18px, 2.7vw, 22px);
      line-height: 1.2;
    }

    .value {
      color: var(--white);
      font-weight: 700;
      font-size: clamp(18px, 2.7vw, 22px);
      line-height: 1.2;
      text-align: right;
      word-break: break-word;
    }

    .record-id {
      letter-spacing: 2px;
      font-family: "Courier New", monospace;
      font-size: clamp(12px, 2vw, 15px);
      text-transform: uppercase;
    }

    .section-title {
      margin: 34px 0 18px;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1;
    }

    .video-box {
      border: 2px solid var(--gold);
      border-radius: 18px;
      padding: 28px 22px;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 16px rgba(201, 163, 74, 0.10);
    }

    .video-box p {
      margin: 0 0 10px;
      font-size: clamp(18px, 2.8vw, 22px);
    }

    .video-placeholder {
      opacity: 0.78;
      font-style: italic;
      font-size: clamp(18px, 2.8vw, 22px);
      color: #bcb2a0;
    }

    .standard-section {
      margin-top: 34px;
    }

    .standard-section h2 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4vw, 34px);
      text-align: center;
    }

    .standard-section p {
      margin: 0 auto;
      max-width: 720px;
      text-align: center;
      color: #d7d2c7;
      font-size: clamp(17px, 2.6vw, 21px);
      line-height: 1.6;
    }

    .score {
      font-size: clamp(26px, 4vw, 34px);
      font-weight: 700;
      text-align: center;
      margin-top: 28px;
      color: var(--gold-soft);
    }

    .status {
      margin: 20px auto 0;
      width: fit-content;
      min-width: 240px;
      text-align: center;
      background: #141414;
      border: 1px solid rgba(212,175,55,0.45);
      color: var(--gold-soft);
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 15px;
      text-transform: uppercase;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
      color: #9f9888;
      line-height: 1.6;
    }

    .landing-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      padding: 44px 20px 70px;
    }

    .landing-watermark {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 0;
      opacity: 0.045;
      filter: grayscale(100%) brightness(1.1);
    }

    .landing-watermark img {
      width: min(520px, 75vw);
    }

    .landing-panel {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
    }

    .landing-brand {
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 15px;
    }

    .landing-panel h1 {
      margin-top: 10px;
      font-size: clamp(40px, 7vw, 68px);
    }

    .landing-panel h2 {
      margin: 16px 0 0;
      color: var(--gold-soft);
      font-size: clamp(22px, 4vw, 32px);
      font-weight: normal;
    }

    .landing-panel p {
      margin: 24px auto 0;
      max-width: 620px;
      color: #dad3c4;
      font-size: clamp(18px, 2.6vw, 22px);
      line-height: 1.65;
    }

    .input-wrap {
      margin-top: 36px;
    }

    .cert-input {
      width: min(100%, 420px);
      padding: 14px 16px;
      border: 1px solid rgba(212,175,55,0.28);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      color: var(--white);
      font-size: 16px;
      outline: none;
    }

    .cert-input::placeholder {
      color: #9f9888;
    }

    .cert-button {
      margin-top: 16px;
      padding: 13px 26px;
      border: none;
      border-radius: 10px;
      background: var(--gold);
      color: #111;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }

    .cert-button.alt {
      background: #2b2b2b;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .tiers {
      margin-top: 80px;
    }

    .tiers h2 {
      margin: 0 0 28px;
      color: var(--gold-soft);
      font-size: clamp(28px, 4.5vw, 42px);
    }

    .tier-grid {
      display: grid;
      gap: 18px;
      max-width: 760px;
      margin: 0 auto;
    }

    .info-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 14px;
      padding: 22px;
      text-align: left;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      backdrop-filter: blur(6px);
    }

    .info-card:hover {
      transform: translateY(-4px);
    }

    .info-card h3 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .info-card p {
      margin: 0;
      max-width: none;
      font-size: 17px;
      line-height: 1.6;
    }

    .green {
      border-color: rgba(61,220,132,0.24);
      background: rgba(61,220,132,0.04);
    }

    .green h3 { color: var(--green); }
    .green p { color: #d8f5e3; }

    .orange {
      border-color: rgba(255,179,71,0.22);
      background: rgba(255,165,0,0.04);
    }

    .orange h3 { color: var(--orange); }
    .orange p { color: #edd7b4; }

    .red {
      border-color: rgba(255,107,107,0.22);
      background: rgba(220,53,69,0.04);
    }

    .red h3 { color: var(--red); }
    .red p { color: #f0b8bd; }

    .small-note {
      margin: 50px auto 0;
      max-width: 620px;
      font-size: 14px;
      color: #8e8777;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .card {
        padding: 34px 18px 26px;
      }

      .row {
        align-items: flex-start;
      }

      .label, .value {
        font-size: 16px;
      }

      .subtitle {
        min-width: 220px;
      }

      .section-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const app = document.getElementById("app");

      function renderLandingPage() {
        app.innerHTML = `
          <div class="landing-shell">
            <div class="landing-watermark">
              <img src="/readymarkseal(best)nobackground.PNG" alt="Ready Mark Seal" />
            </div>

            <div class="landing-panel">
              <div class="landing-brand">THE READY MARK</div>
              <h1>Verification System</h1>
              <h2>Cleanliness Verification & Certification</h2>

              <p>
                Scan a Ready Mark QR code or enter a room number to view a verified inspection report.
              </p>

              <div class="input-wrap">
                <input
                  id="searchInput"
                  placeholder="Enter Room Number (e.g. 101)"
                  class="cert-input"
                />
                <br />
                <button id="verifyBtn" class="cert-button">Verify Room</button>
              </div>

              <div class="tiers">
                <h2>Understanding Ready Mark Tiers</h2>

                <div class="tier-grid">
                  <div class="info-card green">
                    <h3>Verified Clean</h3>
                    <p>
                      This space met Ready Mark inspection standards at the time of review.
                    </p>
                  </div>

                  <div class="info-card orange">
                    <h3>Needs Attention</h3>
                    <p>
                      This space requires corrective action before it can be considered fully verified.
                    </p>
                  </div>

                  <div class="info-card red">
                    <h3>Not Clean</h3>
                    <p>
                      This space did not meet Ready Mark minimum cleanliness standards at the time of inspection.
                    </p>
                  </div>
                </div>

                <div class="small-note">
                  Each Ready Mark verification is time-stamped, room-specific, and conducted under a standardized inspection protocol.
                </div>
              </div>
            </div>
          </div>
        `;

        document.getElementById("verifyBtn").addEventListener("click", function () {
          let val = document.getElementById("searchInput").value.trim().toLowerCase();
          if (!val) return;

          val = val.replace(/\s+/g, "");

          if (/^room-\d+$/.test(val)) {
            window.location.href = "/" + val;
            return;
          }

          if (/^room\d+$/.test(val)) {
            val = val.replace(/^room/, "room-");
            window.location.href = "/" + val;
            return;
          }

          if (/^\d+$/.test(val)) {
            window.location.href = "/room-" + val;
            return;
          }

          alert("Please enter a valid room number, like 101.");
        });
      }

      function renderRoomPage() {
        app.innerHTML = `
          <div class="page-shell">
            <div class="card">
              <div class="brand">THE READY MARK</div>
              <h1>Verified</h1>
              <div class="subtitle">CLEANLINESS STANDARD</div>

              <div class="rows">
                <div class="row">
                  <div class="label">Property</div>
                  <div class="value" id="property">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Room</div>
                  <div class="value" id="room-number">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Inspector ID</div>
                  <div class="value" id="inspector-id">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Inspection Date</div>
                  <div class="value" id="inspection-date">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Certification Level</div>
                  <div class="value" id="certification-tier">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Verification Record ID</div>
                  <div class="value record-id" id="verification-id">Loading...</div>
                </div>
              </div>

              <h2 class="section-title">How This Room Was Verified</h2>

              <div class="video-box">
                <p>Inspection Process Video</p>
                <div class="video-placeholder">Verification process video coming soon</div>
              </div>

              <div class="standard-section">
                <h2>The Ready Mark Standard</h2>
                <p>
                  This room has been inspected under the Ready Mark Cleanliness Standard.
                  High-touch surfaces, linens, bathrooms, and guest areas were reviewed
                  according to the Ready Mark inspection protocol.
                </p>
              </div>

              <div class="score" id="score">Score: Loading...</div>
              <div class="status" id="status">LOADING</div>

              <div class="footer">
                This room has been inspected under the Ready Mark Cleanliness Standard.
              </div>
            </div>
          </div>
        `;
      }

      async function loadRoomVerification(slug) {
        const propertyEl = document.getElementById("property");
        const roomEl = document.getElementById("room-number");
        const inspectorEl = document.getElementById("inspector-id");
        const dateEl = document.getElementById("inspection-date");
        const tierEl = document.getElementById("certification-tier");
        const verificationEl = document.getElementById("verification-id");
        const scoreEl = document.getElementById("score");
        const statusEl = document.getElementById("status");

        try {
          const res = await fetch("/api/get-verification?slug=" + encodeURIComponent(slug), {
            method: "GET",
            headers: {
              "Accept": "application/json"
            }
          });

          const data = await res.json();

          if (!res.ok || !data || !data.room) {
            propertyEl.textContent = data?.property || "Not found";
            roomEl.textContent = data?.room || slug;
            inspectorEl.textContent = data?.error || "Lookup failed";
            dateEl.textContent = "—";
            tierEl.textContent = "Not verified";
            verificationEl.textContent = "—";
            scoreEl.textContent = "Score: Not available";
            statusEl.textContent = "NOT VERIFIED";
            statusEl.style.color = "var(--red)";
            statusEl.style.border = "1px solid rgba(255,107,107,0.45)";
            return;
          }

          propertyEl.textContent = data.property || "—";
          roomEl.textContent = data.room || "—";
          inspectorEl.textContent = data.inspectorId || "—";
          dateEl.textContent = data.inspectionDate
            ? new Date(data.inspectionDate).toLocaleDateString()
            : "—";

          const tier = data.certificationTier || "Not verified";
          const score = data.score;

          tierEl.textContent = tier;
          verificationEl.textContent = data.verificationId || "—";

          if (score !== "" && score != null) {
            scoreEl.textContent = `Score: ${score} / 100`;
          } else {
            scoreEl.textContent = "Score: N/A";
          }

          let tone = "gold";

          if (tier.toLowerCase() === "verified clean") tone = "green";
          else if (tier.toLowerCase() === "needs attention") tone = "orange";
          else if (tier.toLowerCase() === "not clean") tone = "red";
          else if (tier.toLowerCase() === "ready mark premier") tone = "premier";

          switch (tone) {
            case "green":
              tierEl.style.color = "var(--green)";
              scoreEl.style.color = "var(--green)";
              statusEl.style.color = "var(--green)";
              statusEl.style.border = "1px solid rgba(61,220,132,0.45)";
              break;
            case "orange":
              tierEl.style.color = "var(--orange)";
              scoreEl.style.color = "var(--orange)";
              statusEl.style.color = "var(--orange)";
              statusEl.style.border = "1px solid rgba(255,179,71,0.45)";
              break;
            case "red":
              tierEl.style.color = "var(--red)";
              scoreEl.style.color = "var(--red)";
              statusEl.style.color = "var(--red)";
              statusEl.style.border = "1px solid rgba(255,107,107,0.45)";
              break;
            case "premier":
              tierEl.style.color = "var(--premier)";
              scoreEl.style.color = "var(--premier)";
              statusEl.style.color = "var(--premier)";
              statusEl.style.border = "1px solid rgba(244,208,111,0.45)";
              break;
            default:
              tierEl.style.color = "var(--gold-soft)";
              scoreEl.style.color = "var(--gold-soft)";
              statusEl.style.color = "var(--gold-soft)";
              statusEl.style.border = "1px solid rgba(212,175,87,0.45)";
          }

          statusEl.textContent = tier.toUpperCase();
        } catch (err) {
          inspectorEl.textContent = err.message || "Unexpected error";
          dateEl.textContent = "JS_ERROR";
          tierEl.textContent = "Script error";
          verificationEl.textContent = String(err);
          scoreEl.textContent = "Score: Script error";
          statusEl.textContent = "ERROR";
          statusEl.style.color = "var(--red)";
          statusEl.style.border = "1px solid rgba(255,107,107,0.45)";
        }
      }

      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const slug = pathParts[pathParts.length - 1] || null;

      const params = new URLSearchParams(window.location.search);
      const source = params.get("src") || "unknown";

      if (typeof gtag === "function") {
        gtag("event", "qr_scan", { source });
      }

      if (!slug) {
        renderLandingPage();
      } else {
        renderRoomPage();
        loadRoomVerification(slug);
      }
    });
  </script>
</body>
</html>
