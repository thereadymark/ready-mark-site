<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Ready Mark Verification Portal</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-63GYLY26HQ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag("js", new Date());
gtag("config", "G-63GYLY26HQ");
</script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR DESIGN EXACTLY */
body { margin:0; font-family:"Lato",sans-serif; background:#f7f6f3; color:#111; }
.hidden{display:none!important;}
</style>
</head>

<body>
<div id="app"></div>

<script>
/* =========================
GLOBAL STATE
========================= */
let currentGuest = null;
let currentGuestToken = localStorage.getItem("readymark_guest_token") || "";

/* =========================
UTILS
========================= */
function escapeHtml(str){
  if(!str) return "";
  return str.replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
  }[m]));
}

async function fetchJson(url, options={}){
  const res = await fetch(url, options);
  const data = await res.json().catch(()=>null);
  return {res,data};
}

function resetGuestSession(){
  currentGuest=null;
  currentGuestToken="";
  localStorage.removeItem("readymark_guest_token");
}

/* =========================
VERIFY SESSION
========================= */
async function verifyGuestSession(){
  if(!currentGuestToken) return null;

  try{
    const {res,data}=await fetchJson("/api/guest-verify-session",{
      method:"GET",
      headers:{
        "Accept":"application/json",
        "x-guest-token":currentGuestToken
      }
    });

    if(!res.ok || data?.error){
      resetGuestSession();
      return null;
    }

    currentGuest=data.guest;
    return currentGuest;

  }catch{
    resetGuestSession();
    return null;
  }
}

/* =========================
LOGIN MODAL
========================= */
function renderLoginModal(onSuccess){

  document.body.insertAdjacentHTML("beforeend",`
    <div id="auth" style="position:fixed;inset:0;background:#0005;display:flex;align-items:center;justify-content:center;">
      <div style="background:#fff;padding:20px;border-radius:12px;width:300px;">
        <h3>Login</h3>
        <input id="email" placeholder="Email"><br><br>
        <input id="password" type="password" placeholder="Password"><br><br>
        <button id="loginBtn">Login</button>
        <div id="loginStatus"></div>
      </div>
    </div>
  `);

  document.getElementById("loginBtn").onclick=async()=>{

    const email=document.getElementById("email").value.trim();
    const password=document.getElementById("password").value.trim();
    const status=document.getElementById("loginStatus");

    if(!email||!password){
      status.textContent="Enter credentials";
      return;
    }

    try{
      const {res,data}=await fetchJson("/api/guest-login",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Accept":"application/json"
        },
        body:JSON.stringify({email,password})
      });

      if(!res.ok||data?.error){
        throw new Error(data?.error||"Login failed");
      }

      currentGuestToken=data.token;
      localStorage.setItem("readymark_guest_token",currentGuestToken);
      currentGuest=data.guest;

      document.getElementById("auth").remove();
      onSuccess();

    }catch(err){
      status.textContent=err.message;
    }
  };
}

/* =========================
RESULT PAGE
========================= */
function renderResultPage(data,slug){

const verificationId=data.verificationId;

document.getElementById("app").innerHTML=`

<h1>${escapeHtml(data.property)}</h1>
<p>Room ${escapeHtml(data.room)}</p>

<button id="reportBtn">Report Issue</button>

<div id="form" class="hidden">
  <input id="lastName" placeholder="Last name"><br><br>
  <select id="issue">
    <option value="">Select issue</option>
    <option>Cleanliness</option>
    <option>Damage</option>
  </select><br><br>
  <textarea id="note"></textarea><br><br>
  <input type="file" id="photo"><br><br>
  <button id="submit">Submit</button>
  <div id="status"></div>
</div>

`;

document.getElementById("reportBtn").onclick=async()=>{

  if(!currentGuestToken){
    renderLoginModal(()=>openForm());
    return;
  }

  const ok=await verifyGuestSession();
  if(!ok){
    renderLoginModal(()=>openForm());
    return;
  }

  openForm();
};

function openForm(){
  document.getElementById("form").classList.remove("hidden");
}

/* =========================
SUBMIT REPORT (FIXED)
========================= */
document.getElementById("submit").onclick=async()=>{

const lastName=document.getElementById("lastName").value.trim();
const issue=document.getElementById("issue").value;
const note=document.getElementById("note").value;
const file=document.getElementById("photo").files[0];
const status=document.getElementById("status");

if(!lastName){
  status.textContent="Last name required";
  return;
}

let photoPayload=null;

if(file){
  const base64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });

  photoPayload={
    name:file.name,
    type:file.type,
    base64:base64
  };
}

try{

const response=await fetch("/api/report-issue",{
method:"POST",
headers:{
  "Content-Type":"application/json",
  "x-guest-token":currentGuestToken
},
body:JSON.stringify({
  verification_id:verificationId,
  property_slug:slug.split("-room-")[0],
  room_number:data.room,
  issue_types:[issue],
  guest_note:note,
  reservation_last_name:lastName,
  photo_file:photoPayload
})
});

const result=await response.json().catch(()=>null);

if(!response.ok){
  throw new Error(result?.error||"Failed");
}

status.textContent="Submitted";

}catch(err){
status.textContent=err.message;
}

};

}

/* =========================
LOAD PAGE
========================= */
async function loadVerification(slug){

try{
const {res,data}=await fetchJson("/api/get-verification?slug="+slug);

if(!res.ok||data?.error){
  document.getElementById("app").innerHTML="Not found";
  return;
}

renderResultPage(data,slug);

}catch{
document.getElementById("app").innerHTML="Error";
}

}

/* =========================
INIT
========================= */
document.addEventListener("DOMContentLoaded",async()=>{

await verifyGuestSession();

const slug=location.pathname.split("/").pop();

if(!slug||slug==="index.html"){
  document.getElementById("app").innerHTML="<h1>Landing</h1>";
}else{
  loadVerification(slug);
}

});
</script>

</body>
</html>
