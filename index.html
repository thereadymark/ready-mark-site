    function getStatusClass(tier) {
      if (!tier) return "status-default";
      const normalized = String(tier).toLowerCase().trim();
      if (normalized === "verified clean") return "status-verified";
      if (normalized === "needs attention") return "status-attention";
      if (normalized === "not clean") return "status-notclean";
      if (normalized === "ready mark premier") return "status-premier";

    function escapeHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function verifyGuestSession() {
      if (!currentGuestToken) {
        currentGuest = null;
        return null;
      }

      try {
        const { res, data } = await fetchJson("/api/guest-verify-session", {
          method: "GET",
          headers: {
            "Accept": "application/json",
            "x-guest-token": currentGuestToken
          }
        });

        if (!res.ok || data?.error) {
          resetGuestState();
          return null;
        }

        currentGuest = data.guest || null;
        return currentGuest;
      } catch {
        resetGuestState();
        return null;
      }
    }

    async function fileToPhotoObject(file) {
      if (!file) return null;

      if (!ALLOWED_PHOTO_TYPES.has(file.type)) {
        throw new Error("Issue photo must be a JPG, PNG, WEBP, or HEIC image.");
      }

      if (file.size > MAX_PHOTO_BYTES) {
        throw new Error("Issue photo is too large. Maximum size is 10 MB.");
      }

      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = function () {
          const result = reader.result || "";
          const base64 = String(result).split(",")[1] || "";

          if (!base64) {
            reject(new Error("Unable to read photo file."));
            return;
          }

          resolve({
            name: file.name,
            type: file.type,
            base64
          });
        };

        reader.onerror = function () {
          reject(new Error("Unable to read photo file."));
        };

        reader.readAsDataURL(file);
      });
    }

    async function submitGuestReport(payload) {
      const { res, data } = await fetchJson("/api/report-issue", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json",
          "x-guest-token": currentGuestToken
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        if (res.status === 401) {
          resetGuestState();
        }

        const referenceText = data?.reference ? ` Reference #: ${data.reference}` : "";
        const errorMessage =
          data?.error ||
          data?.message ||
          data?.details?.message ||
          "Unable to submit report.";

        throw new Error(`${errorMessage}${referenceText}`);
      }

      return data || {};
    }

              body: JSON.stringify(payload)
            });

            if (!res.ok || data?.error) {
              throw new Error(
                data?.error ||
                data?.message ||
                data?.details?.message ||
                "Unable to continue."
              );
            }

            if (type === "login" && data?.email_verified === true && data?.token) {
              currentGuestToken = data.token;
              sessionStorage.setItem("readymark_guest_token", currentGuestToken);
              currentGuest = data.guest || null;

              closeModal();
              renderGuestChip();
              document.getElementById("report-start-view").classList.add("hidden");
              document.getElementById("report-form-view").classList.remove("hidden");
              return;
            }

            closeModal();
            openEmailVerificationModal(data.email || email);
          } catch (error) {
            setInlineStatus(authStatus, error.message || "Unable to continue.", "error");
          } finally {
            submitBtn.disabled = false;
          }
        });
      }

      renderGuestChip();

      const openReportBtn = document.getElementById("open-report-btn");
      const reportStartView = document.getElementById("report-start-view");
      const reportFormView = document.getElementById("report-form-view");
      const submitReportBtn = document.getElementById("submit-report-btn");
      const cancelReportBtn = document.getElementById("cancel-report-btn");
      const reportStatus = document.getElementById("report-status");

      openReportBtn.addEventListener("click", function () {
        if (!currentGuest || !currentGuest.email) {
          openAuthModal("login");
          return;
        }

        reportStartView.classList.add("hidden");
        reportFormView.classList.remove("hidden");
        clearInlineStatus(reportStatus);
      });

      cancelReportBtn.addEventListener("click", function () {
        reportFormView.classList.add("hidden");
        reportStartView.classList.remove("hidden");
        clearInlineStatus(reportStatus);
      });

      submitReportBtn.addEventListener("click", async function () {
        const checkedIssues = Array.from(document.querySelectorAll('input[name="issue_type"]:checked'))
          .map(input => input.value);

        const guestNote = document.getElementById("guest-note").value.trim();
        const guestPhotoFile = document.getElementById("guest-photo").files[0] || null;

        if (!checkedIssues.length) {
          setInlineStatus(reportStatus, "Please select at least one issue before submitting.", "error");
          return;
        }

        if (!currentGuestToken || !currentGuest || !currentGuest.email) {
          setInlineStatus(reportStatus, "Guest login is required.", "error");
          return;
        }

        if (!verificationId || verificationId === "—") {
          setInlineStatus(reportStatus, "This room is missing a verification record ID.", "error");
          return;
        }

        submitReportBtn.disabled = true;
        setInlineStatus(reportStatus, "Submitting report...");

        try {
          let photoFilePayload = null;

          if (guestPhotoFile) {
            setInlineStatus(reportStatus, "Preparing photo...");
            photoFilePayload = await fileToPhotoObject(guestPhotoFile);
          }

          setInlineStatus(reportStatus, "Saving report...");

          const responseData = await submitGuestReport({
            verification_id: verificationId,
            property_slug: derivedPropertySlug || null,
            property_name: property,
            room_number: room,
            issue_types: checkedIssues,
            guest_note: guestNote || null,
            photo_file: photoFilePayload
          });

          const confirmationNumber =
            responseData?.confirmationNumber ||
            responseData?.confirmation_number ||
            responseData?.reference ||
            responseData?.report?.confirmation_number ||
            responseData?.report?.verification_id ||
            "Unavailable";

          reportStatus.className = "inline-status inline-success";
          reportStatus.innerHTML = `
            <strong>Report received.</strong><br><br>
            <strong>Reference #:</strong> ${escapeHtml(confirmationNumber)}<br><br>
            Ready Mark has been notified.
          `;
          reportStatus.classList.remove("hidden");

          document.querySelectorAll('input[name="issue_type"]').forEach(input => {
            input.checked = false;
          });
          document.getElementById("guest-note").value = "";
          document.getElementById("guest-photo").value = "";

          reportFormView.classList.add("hidden");
          reportStartView.classList.remove("hidden");
        } catch (error) {
          if (/guest login required|invalid or expired guest session|email verification required/i.test(error.message || "")) {
            resetGuestState();
          }
          setInlineStatus(reportStatus, error.message || "Unable to submit report.", "error");
        } finally {
          submitReportBtn.disabled = false;
        }
      });
    }

    function renderErrorPage(message, slug) {
      const app = document.getElementById("app");

      app.innerHTML = `
        <div class="shell">
          <div class="panel">
            <div class="panel-header">
              <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" class="crest">
              ${renderBrandLockup()}
              <h1>Verification Record</h1>
              <div class="subtext">
              
  This room has been inspected and verified under The Ready Mark Cleanliness Standard, with documented room-specific verification tied to this record.
</div>              

<div style="margin-top: 18px; display: flex; justify-content: center;">
  <div class="status-pill status-default">Lookup Error</div>
</div>            </div>

            <div class="content">
              <div class="card">
                <div class="info-grid">
                  <div class="info-item">
                    <div class="info-label">Requested Record</div>
                    <div class="info-value">${escapeHtml(slug || "—")}</div>
                  </div>

                  <div class="info-item">
                    <div class="info-label">Message</div>
                    <div class="info-value">${escapeHtml(message || "Unable to load verification record.")}</div>
                  </div>
                </div>
              </div>

              <div class="portal-link">
                <a href="https://verify.thereadymarkgroup.com">Back to Verification Home</a>
              </div>
            </div>

            <div class="footer-note">
              If this issue persists, please contact The Ready Mark for assistance.
            </div>
          </div>
        </div>
      `;
    }

    async function loadVerification(slug) {
      try {
        const { res, data } = await fetchJson("/api/get-verification?slug=" + encodeURIComponent(slug), {
          method: "GET",
          headers: {
            "Accept": "application/json"
          }
        });

        if (!res.ok || data?.error) {
          renderErrorPage(data?.error || "Verification record not found.", slug);
          return;
        }

        renderResultPage(data || {}, slug);
      } catch (err) {
        renderErrorPage(err?.message || "Unexpected error.", slug);
      }
    }

    document.addEventListener("DOMContentLoaded", async function () {
      await verifyGuestSession();

      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const slug = pathParts[pathParts.length - 1] || null;

      const params = new URLSearchParams(window.location.search);
      const source = params.get("src") || "unknown";

      if (typeof gtag === "function") {
        gtag("event", "qr_scan", { source });
      }

      if (!slug) {
        renderLandingPage();
      } else {
        loadVerification(slug);
      }
    });
  </script>
</body>
</html>
