<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ready Mark | Verification</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-63GYLY26HQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-63GYLY26HQ');
  </script>

  <style>
    :root {
      --page-bg-1: #111111;
      --page-bg-2: #23201b;
      --card-bg-1: rgba(28, 26, 23, 0.94);
      --card-bg-2: rgba(18, 18, 18, 0.96);
      --gold: #c9a34a;
      --gold-soft: #d8b45a;
      --ivory: #f4efe6;
      --muted: #d3c8b6;
      --line: rgba(255, 255, 255, 0.08);
      --green: #3ddc84;
      --orange: #ffb347;
      --red: #ff6b6b;
      --premier: #f4d06f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, serif;
      color: var(--ivory);
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.03), transparent 30%),
        linear-gradient(180deg, var(--page-bg-2), var(--page-bg-1));
    }

    body {
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("/readymarklogonobackground2.PNG");
      background-repeat: repeat;
      background-size: 260px;
      opacity: 0.03;
      filter: grayscale(100%) brightness(1.05);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 45%, rgba(0,0,0,0.25) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .card {
      position: relative;
      width: min(100%, 760px);
      background:
        linear-gradient(145deg, var(--card-bg-1), var(--card-bg-2));
      border: 2px solid var(--gold);
      border-radius: 22px;
      padding: 44px 26px 32px;
      box-shadow:
        0 16px 45px rgba(0, 0, 0, 0.40),
        0 0 18px rgba(201, 163, 74, 0.10);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("/readymarkseal(best)nobackground.PNG");
      background-repeat: no-repeat;
      background-position: center 42%;
      background-size: 360px;
      opacity: 0.05;
      filter: grayscale(100%) brightness(1.1);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .brand {
      text-align: center;
      font-size: 15px;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(42px, 7vw, 68px);
      line-height: 1;
      color: var(--ivory);
    }

    .subtitle {
      text-align: center;
      color: var(--gold-soft);
      font-size: clamp(18px, 3vw, 28px);
      letter-spacing: 1px;
      margin: 18px auto 32px;
      padding: 18px 0;
      position: relative;
      width: fit-content;
      min-width: 260px;
    }

    .subtitle::before,
    .subtitle::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(430px, 88%);
      height: 2px;
      background: var(--gold-soft);
      box-shadow: 0 0 8px rgba(216, 180, 90, 0.18);
    }

    .subtitle::before { top: 0; }
    .subtitle::after { bottom: 0; }

    .rows {
      margin-top: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .label {
      color: var(--muted);
      font-size: clamp(18px, 2.7vw, 22px);
      line-height: 1.2;
    }

    .value {
      color: var(--ivory);
      font-weight: 700;
      font-size: clamp(18px, 2.7vw, 22px);
      line-height: 1.2;
      text-align: right;
      word-break: break-word;
    }

    .record-id {
      letter-spacing: 2px;
      font-family: "Courier New", monospace;
      font-size: clamp(12px, 2vw, 15px);
      text-transform: uppercase;
    }

    .section-title {
      margin: 34px 0 18px;
      font-size: clamp(28px, 5vw, 50px);
      line-height: 1;
    }

    .video-box {
      border: 2px solid var(--gold);
      border-radius: 18px;
      padding: 28px 22px;
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 14px rgba(201, 163, 74, 0.08);
    }

    .video-box p {
      margin: 0 0 10px;
      font-size: clamp(18px, 2.8vw, 22px);
    }

    .video-placeholder {
      opacity: 0.78;
      font-style: italic;
      font-size: clamp(18px, 2.8vw, 22px);
      color: #c7baa3;
    }

    .standard-section {
      margin-top: 34px;
    }

    .standard-section h2 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4vw, 34px);
      text-align: center;
    }

    .standard-section p {
      margin: 0 auto;
      max-width: 720px;
      text-align: center;
      color: #ddd4c5;
      font-size: clamp(17px, 2.6vw, 21px);
      line-height: 1.6;
    }

    .score {
      font-size: clamp(26px, 4vw, 34px);
      font-weight: 700;
      text-align: center;
      margin-top: 28px;
      color: var(--gold-soft);
    }

    .status {
      margin: 20px auto 0;
      width: fit-content;
      min-width: 240px;
      text-align: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(216,180,90,0.42);
      color: var(--gold-soft);
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 15px;
      text-transform: uppercase;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
      color: #a79884;
      line-height: 1.6;
    }

    .landing-shell {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 16px;
    }

    .landing-card {
      width: min(100%, 760px);
      background:
        linear-gradient(145deg, rgba(28,26,23,0.94), rgba(18,18,18,0.96));
      border: 2px solid var(--gold);
      border-radius: 22px;
      padding: 44px 26px;
      text-align: center;
      box-shadow:
        0 16px 45px rgba(0, 0, 0, 0.40),
        0 0 18px rgba(201, 163, 74, 0.10);
    }

    .landing-card h1 {
      margin-bottom: 10px;
    }

    .landing-card h2 {
      margin: 0 0 22px;
      color: var(--gold-soft);
      font-size: clamp(20px, 3.4vw, 30px);
      font-weight: normal;
    }

    .landing-card p {
      margin: 0 auto;
      max-width: 620px;
      color: #ddd4c5;
      font-size: clamp(18px, 2.6vw, 22px);
      line-height: 1.7;
    }

    .landing-actions {
      margin-top: 30px;
    }

    .landing-button {
      display: inline-block;
      padding: 14px 26px;
      background: var(--gold);
      color: #111;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .card,
      .landing-card {
        padding: 34px 18px 26px;
      }

      .row {
        align-items: flex-start;
      }

      .label, .value {
        font-size: 16px;
      }

      .subtitle {
        min-width: 220px;
      }

      .section-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const app = document.getElementById("app");

      function renderLandingPage() {
        app.innerHTML = `
          <div class="landing-shell">
            <div class="landing-card">
              <div class="brand">THE READY MARK</div>
              <h1>Verification System</h1>
              <h2>Cleanliness Verification & Certification</h2>
              <p>
                This verification portal is used to confirm Ready Mark inspection records and room-specific cleanliness standards.
              </p>
              <div class="landing-actions">
                <a class="landing-button" href="https://thereadymarkgroup.com">
                  Return to Main Website
                </a>
              </div>
            </div>
          </div>
        `;
      }

      function renderRoomPage() {
        app.innerHTML = `
          <div class="page-shell">
            <div class="card">
              <div class="brand">THE READY MARK</div>
              <h1>Verified</h1>
              <div class="subtitle">CLEANLINESS STANDARD</div>

              <div class="rows">
                <div class="row">
                  <div class="label">Property</div>
                  <div class="value" id="property">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Room</div>
                  <div class="value" id="room-number">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Inspector ID</div>
                  <div class="value" id="inspector-id">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Inspection Date</div>
                  <div class="value" id="inspection-date">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Certification Level</div>
                  <div class="value" id="certification-tier">Loading...</div>
                </div>

                <div class="row">
                  <div class="label">Verification Record ID</div>
                  <div class="value record-id" id="verification-id">Loading...</div>
                </div>
              </div>

              <h2 class="section-title">How This Room Was Verified</h2>

              <div class="video-box">
                <p>Inspection Process Video</p>
                <div class="video-placeholder">Verification process video coming soon</div>
              </div>

              <div class="standard-section">
                <h2>The Ready Mark Standard</h2>
                <p>
                  This room has been inspected under the Ready Mark Cleanliness Standard.
                  High-touch surfaces, linens, bathrooms, and guest areas were reviewed
                  according to the Ready Mark inspection protocol.
                </p>
              </div>

              <div class="score" id="score">Score: Loading...</div>
              <div class="status" id="status">LOADING</div>

              <div class="footer">
                This room has been inspected under the Ready Mark Cleanliness Standard.
              </div>
            </div>
          </div>
        `;
      }

      async function loadRoomVerification(slug) {
        const propertyEl = document.getElementById("property");
        const roomEl = document.getElementById("room-number");
        const inspectorEl = document.getElementById("inspector-id");
        const dateEl = document.getElementById("inspection-date");
        const tierEl = document.getElementById("certification-tier");
        const verificationEl = document.getElementById("verification-id");
        const scoreEl = document.getElementById("score");
        const statusEl = document.getElementById("status");

        try {
          const res = await fetch("/api/get-verification?slug=" + encodeURIComponent(slug), {
            method: "GET",
            headers: {
              "Accept": "application/json"
            }
          });

          const data = await res.json();

         if (!res.ok || data?.error) {
           propertyEl.textContent = data?.property || "—";
           roomEl.textContent = data?.room || slug;
           inspectorEl.textContent = data?.error || "Lookup failed";
           dateEl.textContent = "—";
           tierEl.textContent = "Not verified";
           verificationEl.textContent = "—";
           scoreEl.textContent = "Score: Not available";
           statusEl.textContent = "NOT VERIFIED";
           statusEl.style.color = "var(--red)";
           statusEl.style.border = "1px solid rgba(255,107,107,0.45)";
         return;
          }
          propertyEl.textContent = data.property || "—";
          roomEl.textContent = data.room || "—";
          inspectorEl.textContent = data.inspectorId || "—";
          dateEl.textContent = data.inspectionDate
            ? new Date(data.inspectionDate).toLocaleDateString()
            : "—";

          const tier = data.certificationTier || "Not verified";
          const score = data.score;

          tierEl.textContent = tier;
          verificationEl.textContent = data.verificationId || "—";

          if (score !== "" && score != null) {
            scoreEl.textContent = `Score: ${score} / 100`;
          } else {
            scoreEl.textContent = "Score: N/A";
          }

          let tone = "gold";

          if (tier.toLowerCase() === "verified clean") tone = "green";
          else if (tier.toLowerCase() === "needs attention") tone = "orange";
          else if (tier.toLowerCase() === "not clean") tone = "red";
          else if (tier.toLowerCase() === "ready mark premier") tone = "premier";

          switch (tone) {
            case "green":
              tierEl.style.color = "var(--green)";
              scoreEl.style.color = "var(--green)";
              statusEl.style.color = "var(--green)";
              statusEl.style.border = "1px solid rgba(61,220,132,0.45)";
              break;
            case "orange":
              tierEl.style.color = "var(--orange)";
              scoreEl.style.color = "var(--orange)";
              statusEl.style.color = "var(--orange)";
              statusEl.style.border = "1px solid rgba(255,179,71,0.45)";
              break;
            case "red":
              tierEl.style.color = "var(--red)";
              scoreEl.style.color = "var(--red)";
              statusEl.style.color = "var(--red)";
              statusEl.style.border = "1px solid rgba(255,107,107,0.45)";
              break;
            case "premier":
              tierEl.style.color = "var(--premier)";
              scoreEl.style.color = "var(--premier)";
              statusEl.style.color = "var(--premier)";
              statusEl.style.border = "1px solid rgba(244,208,111,0.45)";
              break;
            default:
              tierEl.style.color = "var(--gold-soft)";
              scoreEl.style.color = "var(--gold-soft)";
              statusEl.style.color = "var(--gold-soft)";
              statusEl.style.border = "1px solid rgba(216,180,90,0.45)";
          }

          statusEl.textContent = tier.toUpperCase();
        } catch (err) {
          inspectorEl.textContent = err.message || "Unexpected error";
          dateEl.textContent = "JS_ERROR";
          tierEl.textContent = "Script error";
          verificationEl.textContent = String(err);
          scoreEl.textContent = "Score: Script error";
          statusEl.textContent = "ERROR";
          statusEl.style.color = "var(--red)";
          statusEl.style.border = "1px solid rgba(255,107,107,0.45)";
        }
      }

      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const slug = pathParts[pathParts.length - 1] || null;

      const params = new URLSearchParams(window.location.search);
      const source = params.get("src") || "unknown";

      if (typeof gtag === "function") {
        gtag("event", "qr_scan", { source });
      }

      if (!slug) {
        renderLandingPage();
      } else {
        renderRoomPage();
        loadRoomVerification(slug);
      }
    });
  </script>
</body>
</html>
