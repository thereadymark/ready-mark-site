<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ready Mark Verification Portal</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-63GYLY26HQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-63GYLY26HQ');
  </script>

  <style>
    :root {
      --bg: #121416;
      --panel: rgba(26, 30, 34, 0.96);
      --gold: #c7a257;
      --gold-soft: #d8bb7a;
      --text: #f3eee5;
      --muted: #b7b0a5;
      --line: rgba(199, 162, 87, 0.20);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);

      --verified: #3ddc84;
      --attention: #ffb347;
      --notclean: #ff6b6b;
      --premier: #f4d06f;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.03), transparent 28%),
        linear-gradient(180deg, #1b1815 0%, #121416 45%, #121416 100%);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("/readymarklogonobackground2.PNG");
      background-repeat: repeat;
      background-size: 180px;
      opacity: 0.025;
      filter: grayscale(100%) brightness(1.05);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 42%, rgba(0,0,0,0.22) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 34px 18px;
    }

    .panel {
      width: 100%;
      max-width: 820px;
      background: linear-gradient(180deg, rgba(27,31,35,0.98), rgba(21,24,27,0.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(199,162,87,0.08), transparent 40%);
      pointer-events: none;
    }

    .panel-header {
      padding: 38px 26px 24px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 1;
    }

    .crest {
      width: 130px;
      display: block;
      margin: 0 auto 12px;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 16px;
      max-width: 680px;
    }

    .brand-lockup::before,
    .brand-lockup::after {
      content: "";
      flex: 1;
      height: 2px;
      background: linear-gradient(
        90deg,
        rgba(199,162,87,0),
        rgba(216,187,122,0.95),
        rgba(199,162,87,0)
      );
      box-shadow: 0 0 8px rgba(199,162,87,0.18);
      border-radius: 999px;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.04;
    }

    .subtext {
      max-width: 590px;
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .content {
      padding: 26px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: linear-gradient(180deg, rgba(35,39,44,0.88), rgba(25,29,33,0.95));
      border: 1px solid rgba(199,162,87,0.16);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .form-group + .form-group {
      margin-top: 16px;
    }

    label {
      display: block;
      margin-bottom: 9px;
      color: var(--gold-soft);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(199,162,87,0.14);
      border-radius: 14px;
      color: var(--text);
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      appearance: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: Georgia, serif;
    }

    input::placeholder,
    textarea::placeholder {
      color: #8e877b;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(199,162,87,0.40);
      box-shadow: 0 0 0 3px rgba(199,162,87,0.08);
    }

    input[type="checkbox"] {
      appearance: auto !important;
      -webkit-appearance: checkbox !important;
      width: 18px !important;
      height: 18px !important;
      margin: 0 !important;
      accent-color: #c7a257;
    }

    option {
      background: #1b1f23;
      color: var(--text);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      min-height: 50px;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
    }

    .primary-btn {
      background: linear-gradient(180deg, #d8ba73, #b8934c);
      color: #111315;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(199,162,87,0.22);
    }

    .secondary-btn {
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border: 1px solid rgba(199,162,87,0.16);
    }

    .portal-link {
      text-align: center;
      margin-top: 16px;
    }

    .portal-link a {
      color: var(--gold-soft);
      text-decoration: none;
      font-size: 14px;
    }

    .portal-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 12px 20px;
      margin-top: 14px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid rgba(199,162,87,0.20);
      background: rgba(199,162,87,0.08);
      color: var(--gold-soft);
    }

    .status-verified {
      color: var(--verified);
      border-color: rgba(61,220,132,0.35);
      background: rgba(61,220,132,0.08);
      box-shadow: 0 0 12px rgba(61, 220, 132, 0.20);
    }

    .status-attention {
      color: var(--attention);
      border-color: rgba(255,179,71,0.35);
      background: rgba(255,179,71,0.08);
    }

    .status-notclean {
      color: var(--notclean);
      border-color: rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.08);
    }

    .status-premier {
      color: var(--premier);
      border-color: rgba(244,208,111,0.35);
      background: rgba(244,208,111,0.08);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .info-item {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(199,162,87,0.10);
    }

    .info-label {
      color: var(--gold-soft);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 18px;
      line-height: 1.45;
      color: var(--text);
      word-break: break-word;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 36px);
      line-height: 1.1;
    }

    .centered-title {
      text-align: center;
    }

    .section-divider {
      width: 120px;
      height: 2px;
      margin: 0 auto 18px;
      background: linear-gradient(90deg, rgba(199,162,87,0), rgba(216,187,122,0.95), rgba(199,162,87,0));
      box-shadow: 0 0 10px rgba(199,162,87,0.20);
      border-radius: 999px;
    }

    .verification-proof {
      position: relative;
      min-height: 320px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(199,162,87,0.16);
      background:
        linear-gradient(rgba(15,18,20,0.12), rgba(15,18,20,0.18));
    }

    .proof-video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background:
        linear-gradient(rgba(15,18,20,0.12), rgba(15,18,20,0.18));
    }

    .proof-video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .below-video {
      margin-top: 20px;
      padding: 6px 6px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .proof-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: var(--text);
    }

    .proof-icon {
      font-size: 18px;
      line-height: 1;
      margin-top: 2px;
    }

    .proof-step strong {
      display: block;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .proof-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .guest-report-intro {
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
      text-align: center;
      margin-bottom: 14px;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      margin-top: 12px;
    }

    .checkbox-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(199,162,87,0.14);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      font-size: 15px;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      margin-bottom: 0;
    }

    .inline-status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.6;
      border: 1px solid rgba(199,162,87,0.16);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      white-space: pre-wrap;
    }

    .inline-success {
      border-color: rgba(61,220,132,0.35);
      background: rgba(61,220,132,0.08);
      color: #dff7ea;
    }

    .inline-error {
      border-color: rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.08);
      color: #ffe0e0;
    }

    .hidden {
      display: none !important;
    }

    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .auth-modal {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, rgba(27,31,35,0.99), rgba(21,24,27,0.99));
      border: 1px solid rgba(199,162,87,0.20);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 24px;
      position: relative;
    }

    .auth-title {
      text-align: center;
      margin: 0 0 8px;
      font-size: 32px;
      color: var(--text);
    }

    .auth-subtext {
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
      font-size: 15px;
    }

    .auth-switch {
      text-align: center;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .auth-switch a {
      color: var(--gold-soft);
      text-decoration: none;
      cursor: pointer;
    }

    .auth-guest-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(61,220,132,0.08);
      border: 1px solid rgba(61,220,132,0.30);
      color: #dff7ea;
      font-size: 14px;
      margin: 0 auto 18px;
    }

    .guest-auth-wrap {
      text-align: center;
      margin-bottom: 16px;
    }

    .auth-policy-text {
      margin-top: 12px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.6;
    }

    .auth-policy-text a {
      color: var(--gold);
      text-decoration: none;
    }

    .footer-note {
      padding: 0 26px 28px;
      text-align: center;
      color: #958d82;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .panel-header,
      .content {
        padding-left: 20px;
        padding-right: 20px;
      }

      .info-grid,
      .checkbox-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      h1 {
        font-size: 32px;
      }

      .eyebrow {
        font-size: 16px;
      }

      .brand-lockup {
        gap: 8px;
        margin-bottom: 14px;
      }

      .crest {
        width: 120px;
      }

      .verification-proof {
        min-height: 280px;
      }

      .auth-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
<script>
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const form = document.querySelector("form");
const messageBox = document.getElementById("message-box");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    const issueCheckboxes = document.querySelectorAll('input[type="checkbox"]:checked');
    const issues = Array.from(issueCheckboxes).map(cb => cb.value);

    const details = document.querySelector("textarea").value || null;
    const fileInput = document.querySelector('input[type="file"]');

    let photoUrl = null;

    // 🔥 Upload photo if exists
    if (fileInput && fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const fileName = `${Date.now()}-${file.name}`;

      const { error: uploadError } = await supabase.storage
        .from("guest_report_photos")
        .upload(fileName, file);

      if (uploadError) {
        console.error(uploadError);
        alert("Photo upload failed");
        return;
      }

      const { data } = supabase.storage
        .from("guest_report_photos")
        .getPublicUrl(fileName);

      photoUrl = data.publicUrl;
    }

    // 🔥 Generate reference number
    const referenceNumber = `RM-${Date.now()}`;

    // 🔥 Insert into DB
    const { error } = await supabase
      .from("guest_reports")
      .insert({
        verification_id: referenceNumber,
        issue_types: issues,
        details: details,
        photo_url: photoUrl,
        property_slug: window.location.pathname.split("/")[1] || null,
        property_name: document.title || null,
        room_number: window.location.pathname.split("-").pop() || null
      });

    if (error) throw error;

    // ✅ Success UI
    messageBox.innerHTML = `
      <div style="padding:20px; border-radius:12px; background:#0f5132; color:white;">
        <p><strong>Report received.</strong></p>
        <p>Reference #: ${referenceNumber}</p>
        <p>The property has been notified.</p>
      </div>
    `;

    form.reset();

  } catch (err) {
    console.error(err);
    messageBox.innerHTML = `
      <div style="padding:20px; border-radius:12px; background:#842029; color:white;">
        <p>Something went wrong. Please try again.</p>
      </div>
    `;
  }
});
</script></body>
</html>
