<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulk Room Upload | The Ready Mark</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0f172a;
      color: #f8f5ee;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(145deg, #1c2740, #141c2f);
      border: 2px solid #c9a34a;
      border-radius: 18px;
      padding: 28px;
    }

    h1 { text-align: center; }

    select, textarea, button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      margin-bottom: 14px;
    }

    textarea { min-height: 200px; }

    button {
      background: #d4af57;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result {
      margin-top: 10px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
<div class="shell">

  <h1>Bulk Room Upload</h1>

  <select id="propertySelect"></select>

  <textarea id="roomList" placeholder="101
102
103"></textarea>

  <button id="bulkCreateBtn">Create Rooms</button>

  <div class="result" id="resultBox">Ready.</div>

</div>

<script>
const ADMIN_TOKEN = sessionStorage.getItem("readymark_admin_token");

if (!ADMIN_TOKEN) {
  alert("Unauthorized. Please login via admin dashboard.");
  throw new Error("No admin token");
}

const headers = {
  "Content-Type": "application/json",
  "x-admin-token": ADMIN_TOKEN
};

async function loadProperties() {
  const select = document.getElementById("propertySelect");
  const resultBox = document.getElementById("resultBox");

  try {
    const res = await fetch("/api/list-properties", { headers });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    select.innerHTML = '<option value="">Select property</option>';

    data.properties.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = `${p.property_name} (${p.property_slug})`;
      select.appendChild(opt);
    });

    resultBox.textContent = "Properties loaded.";

  } catch (err) {
    resultBox.textContent = "Failed to load properties.";
  }
}

function cleanRoomNumbers(text) {
  return text
    .split(/\r?\n/)
    .map(r => r.trim())
    .filter(r => /^[a-zA-Z0-9\-]+$/.test(r));
}

async function bulkCreateRooms() {
  const propertyId = document.getElementById("propertySelect").value;
  const raw = document.getElementById("roomList").value;
  const resultBox = document.getElementById("resultBox");
  const btn = document.getElementById("bulkCreateBtn");

  if (!propertyId) {
    resultBox.textContent = "Select a property.";
    return;
  }

  const roomNumbers = cleanRoomNumbers(raw);

  if (!roomNumbers.length) {
    resultBox.textContent = "Enter valid room numbers.";
    return;
  }

  btn.disabled = true;
  resultBox.textContent = "Creating rooms...";

  try {
    const res = await fetch("/api/bulk-create-rooms", {
      method: "POST",
      headers,
      body: JSON.stringify({ propertyId, roomNumbers })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    resultBox.textContent =
      `Done.\n\nCreated: ${data.created?.length || 0}\nSkipped: ${data.skipped?.length || 0}`;

    document.getElementById("roomList").value = "";

  } catch (err) {
    resultBox.textContent = "Error: " + err.message;
  }

  btn.disabled = false;
}

document.getElementById("bulkCreateBtn").onclick = bulkCreateRooms;

loadProperties();
</script>
</body>
</html>
