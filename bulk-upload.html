<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulk Room Upload | The Ready Mark</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0f172a;
      color: #f8f5ee;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .shell {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(145deg, #1c2740, #141c2f);
      border: 2px solid #c9a34a;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 42px;
    }

    p {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #d4af57;
      font-weight: bold;
    }

    select, textarea, button, input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-family: inherit;
      margin-bottom: 18px;
    }

    select, textarea, input[type="file"] {
      background: #f8f5ee;
      color: #111827;
    }

    textarea {
      min-height: 240px;
      resize: vertical;
    }

    button {
      background: #d4af57;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .result {
      margin-top: 14px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(212,175,87,0.25);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .note-box {
      margin-bottom: 18px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,87,0.18);
      color: #d1d5db;
      line-height: 1.7;
    }

    .good {
      color: #86efac;
      font-weight: bold;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-row button {
      flex: 1 1 260px;
      margin-bottom: 0;
    }

    .small-status {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Bulk Room Upload</h1>
    <p>Paste one room number per line or upload a CSV, then create rooms and download all QR codes as a ZIP.</p>

    <div class="note-box">
      Accepted formats:
      <br><br>
      <span class="good">Option 1:</span>
      <br>
      room_number
      <br>
      101
      <br>
      102
      <br>
      103
      <br><br>
      <span class="good">Option 2:</span>
      <br>
      101
      <br>
      102
      <br>
      103
    </div>

    <label for="propertySelect">Property</label>
    <select id="propertySelect">
      <option value="">Loading properties...</option>
    </select>

    <label for="csvFile">Upload CSV File</label>
    <input id="csvFile" type="file" accept=".csv,text/csv" />

    <label for="previewBox">Preview Parsed Room Numbers</label>
    <textarea id="previewBox" readonly placeholder="Parsed room numbers will appear here..."></textarea>

    <div class="action-row">
      <button id="parseCsvBtn" type="button">Parse CSV</button>
      <button id="uploadCsvBtn" type="button">Create Rooms from CSV</button>
      <button id="downloadZipBtn" type="button" disabled>Download All QR Codes ZIP</button>
    </div>

    <div class="small-status" id="zipStatus"></div>

    <div class="result" id="resultBox">Ready.</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const ADMIN_PASSWORD = "readymark2026";

    let entered = sessionStorage.getItem("admin_auth");

    if (entered !== ADMIN_PASSWORD) {
      entered = prompt("Enter admin password:");

      if (entered !== ADMIN_PASSWORD) {
        document.body.innerHTML =
          "<h1 style='color:white;text-align:center;margin-top:100px;'>Access Denied</h1>";
        throw new Error("Unauthorized");
      }

      sessionStorage.setItem("admin_auth", entered);
    }

    let parsedRoomNumbers = [];
    let latestCreatedRooms = [];

    async function loadProperties() {
      const select = document.getElementById("propertySelect");
      const resultBox = document.getElementById("resultBox");

      try {
        const res = await fetch("/api/list-properties");
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Failed to load properties");
        }

        select.innerHTML = '<option value="">Select a property</option>';

        data.properties.forEach((property) => {
          const option = document.createElement("option");
          option.value = property.id;
          option.textContent = `${property.property_name} (${property.property_slug})`;
          select.appendChild(option);
        });

        resultBox.textContent = "Properties loaded.";
      } catch (err) {
        select.innerHTML = '<option value="">Could not load properties</option>';
        resultBox.textContent = `Error loading properties: ${err.message}`;
      }
    }

    function parseCsvText(text) {
      const lines = text
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      if (!lines.length) return [];

      const firstLine = lines[0].toLowerCase().replace(/"/g, "").trim();
      let dataLines = lines;

      if (
        firstLine === "room_number" ||
        firstLine === "room number" ||
        firstLine === "room"
      ) {
        dataLines = lines.slice(1);
      }

      return dataLines
        .map((line) => {
          const firstCell = line.split(",")[0].replace(/"/g, "").trim();
          return firstCell;
        })
        .filter(Boolean);
    }

    async function parseCsvFile() {
      const fileInput = document.getElementById("csvFile");
      const previewBox = document.getElementById("previewBox");
      const resultBox = document.getElementById("resultBox");

      const file = fileInput.files[0];

      if (!file) {
        resultBox.textContent = "Please choose a CSV file first.";
        return;
      }

      try {
        const text = await file.text();
        parsedRoomNumbers = parseCsvText(text);

        if (!parsedRoomNumbers.length) {
          previewBox.value = "";
          resultBox.textContent = "No valid room numbers found in the CSV.";
          return;
        }

        previewBox.value = parsedRoomNumbers.join("\n");
        resultBox.textContent = `Parsed ${parsedRoomNumbers.length} room numbers successfully.`;
      } catch (err) {
        resultBox.textContent = `Error parsing CSV: ${err.message}`;
      }
    }

    async function uploadParsedRooms() {
      const propertyId = document.getElementById("propertySelect").value;
      const resultBox = document.getElementById("resultBox");
      const downloadZipBtn = document.getElementById("downloadZipBtn");
      const zipStatus = document.getElementById("zipStatus");

      if (!propertyId) {
        resultBox.textContent = "Please choose a property.";
        return;
      }

      if (!parsedRoomNumbers.length) {
        resultBox.textContent = "Please parse a CSV file first.";
        return;
      }

      resultBox.textContent = "Creating rooms from CSV...";
      zipStatus.textContent = "";
      downloadZipBtn.disabled = true;
      latestCreatedRooms = [];

      try {
        const res = await fetch("/api/bulk-create-rooms", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            propertyId,
            roomNumbers: parsedRoomNumbers,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "CSV room creation failed");
        }

        latestCreatedRooms = data.created || [];

        const createdCount = latestCreatedRooms.length;
        const skippedCount = data.skipped?.length || 0;

        resultBox.innerHTML = `
<strong>CSV upload complete.</strong>

Created: ${createdCount}
Skipped (already existed): ${skippedCount}

${createdCount ? `Created Rooms:
${latestCreatedRooms.map((room) => `- Room ${room.room_number} → ${room.qr_slug}`).join("\n")}` : ""}

${skippedCount ? `Skipped Rooms:
${data.skipped.map((room) => `- ${room}`).join("\n")}` : ""}
        `;

        if (createdCount > 0) {
          downloadZipBtn.disabled = false;
          zipStatus.textContent = `${createdCount} QR codes are ready to zip.`;
        } else {
          zipStatus.textContent = "No new rooms were created, so there are no new QR codes to zip.";
        }
      } catch (err) {
        resultBox.textContent = `Error: ${err.message}`;
      }
    }

    async function downloadQrZip() {
      const downloadZipBtn = document.getElementById("downloadZipBtn");
      const zipStatus = document.getElementById("zipStatus");

      if (!latestCreatedRooms.length) {
        zipStatus.textContent = "No newly created rooms available for ZIP download.";
        return;
      }

      downloadZipBtn.disabled = true;
      zipStatus.textContent = "Building ZIP file...";

      try {
        const zip = new JSZip();

        for (const room of latestCreatedRooms) {
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(room.qr_url)}`;
          const response = await fetch(qrUrl);

          if (!response.ok) {
            throw new Error(`Failed to fetch QR for room ${room.room_number}`);
          }

          const blob = await response.blob();
          zip.file(`qr-${room.qr_slug}.png`, blob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        const downloadUrl = URL.createObjectURL(zipBlob);

        const link = document.createElement("a");
        link.href = downloadUrl;
        link.download = "ready-mark-qr-codes.zip";
        document.body.appendChild(link);
        link.click();
        link.remove();

        URL.revokeObjectURL(downloadUrl);

        zipStatus.textContent = "ZIP downloaded successfully.";
      } catch (err) {
        zipStatus.textContent = `ZIP error: ${err.message}`;
      } finally {
        downloadZipBtn.disabled = false;
        console.log("ZIP READY:", latestCreatedRooms);     
      }
    }

    document.getElementById("parseCsvBtn").addEventListener("click", parseCsvFile);
    document.getElementById("uploadCsvBtn").addEventListener("click", uploadParsedRooms);
    document.getElementById("downloadZipBtn").addEventListener("click", downloadQrZip);

    loadProperties();
  </script>
</body>
</html>
