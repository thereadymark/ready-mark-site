<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guest Follow-Up | The Ready Mark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(199,162,87,0.16), transparent 34%),
        linear-gradient(180deg, #fbfaf6 0%, #f6f2ea 100%);
      color: #111315;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 42px 18px;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(199,162,87,0.42);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(17,19,21,0.1);
      overflow: hidden;
    }

    .header {
      text-align: center;
      padding: 36px 28px 24px;
      border-bottom: 1px solid #e8dfca;
    }

    .logo {
      width: 90px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 34px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .sub {
      margin: 12px auto 0;
      color: #6f6a61;
      line-height: 1.7;
      max-width: 560px;
      font-size: 15px;
    }

    .body {
      padding: 30px;
      text-align: center;
    }

    .question {
      font-family: Georgia, serif;
      font-size: 28px;
      font-weight: 500;
      margin: 0 0 12px;
    }

    .note {
      color: #6f6a61;
      line-height: 1.7;
      margin: 0 auto 24px;
      max-width: 560px;
      font-size: 14px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 20px;
    }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      min-height: 54px;
    }

    .btn-primary {
      background: linear-gradient(180deg, #d8ba73, #b8934c);
      color: #111315;
    }

    .btn-secondary {
      background: #fff;
      color: #9d7b34;
      border: 1px solid #e1d4b8;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      display: none;
      margin-top: 22px;
      padding: 15px;
      border-radius: 14px;
      line-height: 1.6;
      font-size: 14px;
    }

    .status.success {
      display: block;
      background: rgba(47,143,87,0.08);
      border: 1px solid rgba(47,143,87,0.22);
      color: #2f8f57;
    }

    .status.error {
      display: block;
      background: rgba(180,76,76,0.08);
      border: 1px solid rgba(180,76,76,0.22);
      color: #b44c4c;
    }

    .footer {
      padding: 22px;
      text-align: center;
      color: #8a7350;
      font-size: 13px;
      border-top: 1px solid #e8dfca;
    }

    .footer a {
      color: #9d7b34;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .actions {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 30px;
      }

      .question {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <img src="/readymarkseal(best)nobackground.PNG" class="logo" alt="The Ready Mark" />
        <h1>Issue Follow-Up</h1>
        <p class="sub">
          Please confirm whether your room cleanliness issue has been resolved.
        </p>
      </div>

      <div class="body">
        <h2 class="question">Was your issue resolved?</h2>
        <p class="note">
          Your response helps The Ready Mark confirm whether the property fully addressed the concern or whether the issue needs to be reopened.
        </p>

        <div class="actions">
          <button id="resolved-btn" class="btn btn-primary" type="button">
            Yes, Issue Resolved
          </button>

          <button id="attention-btn" class="btn btn-secondary" type="button">
            No, Still Needs Attention
          </button>
        </div>

        <div id="status-box" class="status"></div>
      </div>

      <div class="footer">
        <a href="/">Back to Portal</a>
        &nbsp; | &nbsp;
        <a href="/privacy.html">Privacy Policy</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const reportId = params.get("report_id") || params.get("id") || "";
    const tokenFromUrl = params.get("token") || "";
    const guestToken =
      tokenFromUrl ||
      localStorage.getItem("readymark_guest_token") ||
      sessionStorage.getItem("readymark_guest_token") ||
      "";

    const statusBox = document.getElementById("status-box");
    const resolvedBtn = document.getElementById("resolved-btn");
    const attentionBtn = document.getElementById("attention-btn");

    function showStatus(message, type) {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    function setLoading(isLoading) {
      resolvedBtn.disabled = isLoading;
      attentionBtn.disabled = isLoading;
    }

    async function submitGuestResponse(responseValue) {
      if (!reportId) {
        showStatus("Missing report reference. Please use the follow-up link from your report.", "error");
        return;
      }

      if (!guestToken) {
        showStatus("Guest session missing. Please open the follow-up link from your email or sign in again.", "error");
        return;
      }

      setLoading(true);

      try {
        const res = await fetch("/api/guest-confirm-resolution", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json",
            "x-guest-token": guestToken
          },
          body: JSON.stringify({
            report_id: reportId,
            response: responseValue
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(data?.error || "Unable to submit your response.");
        }

        if (responseValue === "resolved") {
          showStatus("Thank you. Your issue has been marked as confirmed with the guest. The Ready Mark team will complete final closure.", "success");
        } else {
          showStatus("Thank you. Your report has been reopened and marked as still needing attention.", "success");
        }
      } catch (error) {
        showStatus(error.message || "Unable to submit your response.", "error");
      } finally {
        setLoading(false);
      }
    }

    resolvedBtn.addEventListener("click", () => submitGuestResponse("resolved"));
    attentionBtn.addEventListener("click", () => submitGuestResponse("still_needs_attention"));
  </script>
</body>
</html>
