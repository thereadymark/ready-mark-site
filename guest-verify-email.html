<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify Email | The Ready Mark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#fbfaf6,#f6f2ea);
      color:#171717;
    }

    .card {
      width:100%;
      max-width:520px;
      background:linear-gradient(180deg,#fffdf8,#f3eadb);
      border:1px solid rgba(227,211,170,.85);
      border-radius:28px;
      box-shadow:0 28px 80px rgba(17,19,21,.10);
      padding:34px 28px;
      text-align:center;
    }

    img {
      width:100px;
      margin-bottom:18px;
      filter:drop-shadow(0 16px 22px rgba(0,0,0,.18));
    }

    .eyebrow {
      color:#9d7b34;
      text-transform:uppercase;
      letter-spacing:4px;
      font-size:12px;
      font-weight:900;
      margin-bottom:8px;
    }

    h1 {
      font-family:Georgia,serif;
      font-size:34px;
      margin:0 0 10px;
      text-transform:uppercase;
      font-weight:500;
    }

    p {
      color:#6f6a61;
      font-size:14px;
      line-height:1.7;
      margin-bottom:20px;
    }

    label {
      display:block;
      text-align:left;
      margin:16px 0 8px;
      font-size:12px;
      text-transform:uppercase;
      font-weight:900;
      color:#6f6a61;
      letter-spacing:1px;
    }

    input {
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(199,162,87,.26);
      background:#fff;
      font-size:17px;
      text-align:center;
      letter-spacing:4px;
      font-weight:800;
    }

    button {
      width:100%;
      margin-top:20px;
      padding:14px;
      border-radius:14px;
      border:none;
      background:linear-gradient(180deg,#d8ba73,#b8934c);
      font-weight:900;
      cursor:pointer;
      min-height:48px;
    }

    button:disabled {
      opacity:.65;
      cursor:not-allowed;
    }

    .link-btn {
      background:transparent;
      color:#9d7b34;
      box-shadow:none;
      margin-top:10px;
      font-size:13px;
    }

    .status {
      margin-top:16px;
      padding:12px;
      border-radius:12px;
      display:none;
      font-size:14px;
      line-height:1.6;
      text-align:left;
    }

    .status.info {
      background:rgba(255,255,255,.65);
      border:1px solid #e3d3aa;
      color:#6f6a61;
      display:block;
    }

    .status.error {
      background:rgba(180,76,76,.08);
      border:1px solid rgba(180,76,76,.22);
      color:#b44c4c;
      display:block;
    }

    .status.success {
      background:rgba(47,143,87,.08);
      border:1px solid rgba(47,143,87,.22);
      color:#2f8f57;
      display:block;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="/readymarkseal(best)nobackground.PNG" alt="The Ready Mark" />
    <div class="eyebrow">The Ready Mark</div>
    <h1>Verify Email</h1>

    <p>
      Enter the 6-digit verification code sent to your email address.
    </p>

    <label for="code">Verification Code</label>
    <input id="code" inputmode="numeric" maxlength="6" placeholder="000000" />

    <button id="verify-btn" type="button">Verify Email</button>
    <button id="resend-btn" class="link-btn" type="button">Resend Code</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    const VERIFY_API = "/api/guest-verify-session";
    const RESEND_API = "/api/resend-verification-code";

    const params = new URLSearchParams(window.location.search);
    const redirectTarget = params.get("redirect") || "/";
    const emailFromUrl = params.get("email") || "";

    const pendingEmail = emailFromUrl || localStorage.getItem("readymark_pending_guest_email") || "";

    const codeInput = document.getElementById("code");
    const verifyBtn = document.getElementById("verify-btn");
    const resendBtn = document.getElementById("resend-btn");
    const statusBox = document.getElementById("status");

    function showStatus(message, type = "info") {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    function safeRedirect(url) {
      if (!url || typeof url !== "string") return "/";
      if (url.startsWith("http://") || url.startsWith("https://")) return "/";
      return url;
    }

    if (!pendingEmail) {
      showStatus("Missing email address. Please create an account or log in again.", "error");
      verifyBtn.disabled = true;
      resendBtn.disabled = true;
    }

    async function verifyCode() {
      const code = codeInput.value.trim();

      if (!pendingEmail) {
        showStatus("Missing email address. Please create an account or log in again.", "error");
        return;
      }

      if (!code || code.length !== 6) {
        showStatus("Please enter the 6-digit verification code.", "error");
        return;
      }

      verifyBtn.disabled = true;
      verifyBtn.textContent = "Verifying...";
      showStatus("Verifying your email...", "info");

      try {
        const res = await fetch(VERIFY_API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            email: pendingEmail,
            code
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(data?.error || "Unable to verify email.");
        }

        if (data.token) {
          localStorage.setItem("readymark_guest_token", data.token);
        }

        localStorage.setItem("readymark_guest_email", data.guest?.email || pendingEmail);
        localStorage.setItem("readymark_guest_name", `${data.guest?.first_name || ""} ${data.guest?.last_name || ""}`.trim());
        localStorage.removeItem("readymark_pending_guest_email");

        showStatus("Email verified. Redirecting...", "success");

        setTimeout(() => {
          window.location.href = safeRedirect(redirectTarget);
        }, 900);
      } catch (error) {
        showStatus(error.message || "Unable to verify email.", "error");
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.textContent = "Verify Email";
      }
    }

    async function resendCode() {
      if (!pendingEmail) {
        showStatus("Missing email address. Please create an account or log in again.", "error");
        return;
      }

      resendBtn.disabled = true;
      resendBtn.textContent = "Sending...";
      showStatus("Sending a new verification code...", "info");

      try {
        const res = await fetch(RESEND_API, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            email: pendingEmail
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(data?.error || "Unable to resend code.");
        }

        showStatus(data?.message || "A new verification code has been sent.", "success");
      } catch (error) {
        showStatus(error.message || "Unable to resend code.", "error");
      } finally {
        resendBtn.disabled = false;
        resendBtn.textContent = "Resend Code";
      }
    }

    verifyBtn.addEventListener("click", verifyCode);
    resendBtn.addEventListener("click", resendCode);

    codeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        verifyCode();
      }
    });
  </script>
</body>
</html>
