<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Confirm Issue Resolution | The Ready Mark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      min-height:100vh;
      font-family:Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(199,162,87,0.16), transparent 34%),
        linear-gradient(180deg, #fbfaf6 0%, #f6f2ea 100%);
      color:#111315;
    }

    .wrap {
      max-width:720px;
      margin:0 auto;
      padding:42px 18px;
    }

    .card {
      background:rgba(255,255,255,0.92);
      border:1px solid rgba(199,162,87,0.4);
      border-radius:24px;
      box-shadow:0 24px 70px rgba(17,19,21,0.1);
      overflow:hidden;
    }

    .header {
      text-align:center;
      padding:36px 28px 24px;
      border-bottom:1px solid #e8dfca;
    }

    .logo {
      width:88px;
      margin-bottom:12px;
      filter:drop-shadow(0 12px 18px rgba(0,0,0,0.12));
    }

    h1 {
      margin:0;
      font-family:Georgia, serif;
      font-size:34px;
      font-weight:500;
    }

    .sub {
      margin:10px auto 0;
      color:#6f6a61;
      line-height:1.7;
      max-width:560px;
      font-size:14px;
    }

    .body {
      padding:28px;
      text-align:center;
    }

    .status {
      margin-top:18px;
      padding:14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.6;
      display:none;
    }

    .status.success {
      display:block;
      color:#2f8f57;
      background:rgba(47,143,87,0.08);
      border:1px solid rgba(47,143,87,0.22);
    }

    .status.error {
      display:block;
      color:#b44c4c;
      background:rgba(180,76,76,0.08);
      border:1px solid rgba(180,76,76,0.22);
    }

    .btn {
      width:100%;
      margin-top:14px;
      border:0;
      border-radius:14px;
      padding:15px 18px;
      cursor:pointer;
      background:linear-gradient(180deg, #d8ba73, #b8934c);
      color:#111315;
      font-weight:800;
      font-size:15px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      box-sizing:border-box;
    }

    .btn.secondary {
      background:rgba(255,255,255,0.78);
      border:1px solid #e1d4b8;
      color:#9d7b34;
    }

    textarea {
      width:100%;
      min-height:110px;
      box-sizing:border-box;
      border:1px solid #e1d4b8;
      border-radius:14px;
      padding:14px 15px;
      font-size:15px;
      background:#fff;
      color:#111315;
      outline:none;
      margin-top:14px;
      resize:vertical;
    }

    .note {
      margin-top:16px;
      color:#7c7468;
      font-size:13px;
      line-height:1.6;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <img src="/readymarkseal(best)nobackground.PNG" class="logo" alt="The Ready Mark" />
        <h1>Confirm Issue Resolution</h1>
        <p class="sub">
          Let us know whether your reported room cleanliness concern was fully addressed.
        </p>
      </div>

      <div class="body">
        <p class="note" id="reference-text">Loading report details...</p>

        <textarea id="guest-note" placeholder="Optional: add a note about the resolution or remaining concern."></textarea>

        <button id="resolved-btn" class="btn" type="button">Issue Resolved</button>
        <button id="still-needs-attention-btn" class="btn secondary" type="button">Still Needs Attention</button>

        <div id="status-box" class="status"></div>

        <a href="/" class="btn secondary">Return to Ready Mark Portal</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const reportId = params.get("report_id") || "";
    const token = params.get("token") || "";
    const reference = params.get("reference") || "";

    const statusBox = document.getElementById("status-box");
    const noteInput = document.getElementById("guest-note");
    const referenceText = document.getElementById("reference-text");
    const resolvedBtn = document.getElementById("resolved-btn");
    const stillBtn = document.getElementById("still-needs-attention-btn");

    referenceText.textContent = reference
      ? `Reference Number: ${reference}`
      : "Reference number unavailable.";

    function showStatus(message, type) {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    async function submitResolution(responseStatus) {
      if (!reportId || !token) {
        showStatus("This resolution link is missing required information.", "error");
        return;
      }

      resolvedBtn.disabled = true;
      stillBtn.disabled = true;

      try {
        const res = await fetch("/api/guest-confirm-resolution", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            report_id: reportId,
            token,
            guest_resolution_status: responseStatus,
            guest_resolution_note: noteInput.value.trim()
          })
        });

        const data = await res.json().catch(() => null);

        if (!res.ok || data?.error) {
          throw new Error(data?.error || "Unable to submit confirmation.");
        }

        showStatus(
          responseStatus === "guest_confirmed_resolved"
            ? "Thank you. This issue has been confirmed as resolved."
            : "Thank you. This issue has been marked as still needing attention.",
          "success"
        );
      } catch (error) {
        showStatus(error.message || "Unable to submit confirmation.", "error");
        resolvedBtn.disabled = false;
        stillBtn.disabled = false;
      }
    }

    resolvedBtn.addEventListener("click", () => submitResolution("guest_confirmed_resolved"));
    stillBtn.addEventListener("click", () => submitResolution("guest_still_needs_attention"));
  </script>
</body>
</html>
