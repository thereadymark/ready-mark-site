<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Room | The Ready Mark</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0f172a;
      color: #f8f5ee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(145deg, #1c2740, #141c2f);
      border: 2px solid #c9a34a;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 24px;
      align-items: start;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #f8f5ee;
    }

    p {
      text-align: center;
      color: #d1d5db;
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #d4af57;
      font-weight: bold;
    }

    select,
    input,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 8px;
      border: none;
      margin-bottom: 18px;
      font-size: 16px;
    }

    select,
    input {
      background: #f8f5ee;
      color: #111827;
    }

    button {
      background: #d4af57;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 87, 0.25);
      white-space: normal;
      line-height: 1.6;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .action-btn,
    .action-link {
      background: #d4af57;
      color: #111827;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      width: auto;
      margin-bottom: 0;
    }

    .qr-panel {
      text-align: center;
      padding: 18px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 87, 0.25);
      min-height: 200px;
    }

    .status-message {
      margin-top: 12px;
      font-weight: bold;
    }

    .status-success {
      color: #3ddc84;
    }

    .status-error {
      color: #ff6b6b;
    }

    a.inline-link {
      color: #93c5fd;
      word-break: break-all;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Add Room</h1>
    <p>Create a room and auto-generate its QR slug and verification URL.</p>

    <div class="layout">
      <div>
        <label for="propertySelect">Property</label>
        <select id="propertySelect">
          <option value="">Loading properties...</option>
        </select>

        <label for="roomNumber">Room Number</label>
        <input id="roomNumber" type="text" placeholder="e.g. 814" />

        <button id="createRoomBtn" type="button">Create Room</button>

        <div class="result" id="resultBox">Ready.</div>
      </div>

      <div class="qr-panel" id="qrContainer">
        <p style="margin: 0; color: #d1d5db;">QR code will appear here.</p>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "readymark2026";

    let entered = sessionStorage.getItem("admin_auth");

    if (entered !== ADMIN_PASSWORD) {
      entered = prompt("Enter admin password:");

      if (entered !== ADMIN_PASSWORD) {
        document.body.innerHTML =
          "<h1 style='color:white;text-align:center;margin-top:100px;'>Access Denied</h1>";
        throw new Error("Unauthorized");
      }

      sessionStorage.setItem("admin_auth", entered);
    }

    async function loadProperties() {
      const select = document.getElementById("propertySelect");
      const resultBox = document.getElementById("resultBox");

      try {
        const res = await fetch("/api/list-properties");
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Failed to load properties");
        }

        select.innerHTML = '<option value="">Select a property</option>';

        data.properties.forEach((property) => {
          const option = document.createElement("option");
          option.value = property.id;
          option.textContent = `${property.property_name} (${property.property_slug})`;
          select.appendChild(option);
        });

        resultBox.textContent = "Properties loaded.";
      } catch (err) {
        select.innerHTML = '<option value="">Could not load properties</option>';
        resultBox.textContent = `Error loading properties: ${err.message}`;
      }
    }

    async function createRoom() {
      const propertyId = document.getElementById("propertySelect").value;
      const roomNumber = document.getElementById("roomNumber").value.trim();
      const resultBox = document.getElementById("resultBox");
      const qrContainer = document.getElementById("qrContainer");

      if (!propertyId || !roomNumber) {
        resultBox.textContent = "Please choose a property and enter a room number.";
        return;
      }

      resultBox.textContent = "Creating room...";
      qrContainer.innerHTML = `<p style="margin:0; color:#d1d5db;">Generating QR...</p>`;

      try {
        const res = await fetch("/api/create-room", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ propertyId, roomNumber }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Failed to create room");
        }

        resultBox.innerHTML = `
          <strong>Room created successfully.</strong><br><br>
          Room Number: ${data.room.room_number}<br>
          QR Slug: ${data.room.qr_slug}<br>
          QR URL: <a class="inline-link" href="${data.room.qr_url}" target="_blank">${data.room.qr_url}</a>

          <div class="action-row">
            <button id="copyUrlBtn" type="button" class="action-btn">Copy URL</button>
            <button id="openVerifyBtn" type="button" class="action-btn">Open Verification Page</button>
            <a
              id="downloadQrBtn"
              class="action-link"
              href="https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(data.room.qr_url)}"
              download="qr-${data.room.qr_slug}.png"
              target="_blank"
            >
              Download QR Code
            </a>
          </div>

          <div id="copyStatus" class="status-message"></div>
        `;

        qrContainer.innerHTML = `
          <p style="margin-bottom:10px;">QR Code:</p>
          <img
            id="generatedQrImage"
            src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(data.room.qr_url)}"
            alt="Generated QR code"
            style="display:block; margin:0 auto 12px auto;"
          />
        `;

        document.getElementById("copyUrlBtn").addEventListener("click", async () => {
          const copyStatus = document.getElementById("copyStatus");

          try {
            await navigator.clipboard.writeText(data.room.qr_url);
            copyStatus.textContent = "URL copied.";
            copyStatus.className = "status-message status-success";
          } catch (err) {
            copyStatus.textContent = "Could not copy URL.";
            copyStatus.className = "status-message status-error";
          }
        });

        document.getElementById("openVerifyBtn").addEventListener("click", () => {
          window.open(data.room.qr_url, "_blank");
        });
      } catch (err) {
        resultBox.textContent = `Error: ${err.message}`;
        qrContainer.innerHTML = `<p style="margin:0; color:#ff6b6b;">QR generation failed.</p>`;
      }
    }

    document.getElementById("createRoomBtn").addEventListener("click", createRoom);
    loadProperties();
  </script>
</body>
</html>
