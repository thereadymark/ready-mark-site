<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin QR Package | The Ready Mark</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0f172a;
      color: #f8f5ee;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 1000px;
      background: linear-gradient(145deg, #1c2740, #141c2f);
      border: 2px solid #c9a34a;
      border-radius: 18px;
      padding: 28px;
    }

    h1 { text-align: center; }

    select, button {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #d4af57;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status { font-size: 14px; margin-top: 8px; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>
<div class="shell">

  <h1>QR Package Generator</h1>

  <select id="propertySelect"></select>

  <button id="loadBtn">Load Rooms</button>
  <button id="downloadBtn" disabled>Download ZIP</button>

  <div class="status" id="status"></div>

</div>

<script>
const ADMIN_TOKEN = localStorage.getItem("admin_token");

if (!ADMIN_TOKEN) {
  alert("Missing admin token. Please login first.");
  throw new Error("Unauthorized");
}

const headers = {
  "Content-Type": "application/json",
  "x-admin-token": ADMIN_TOKEN
};

let property = null;
let rooms = [];

async function loadProperties() {
  const select = document.getElementById("propertySelect");

  try {
    const res = await fetch("/api/list-properties", { headers });
    const data = await res.json();

    select.innerHTML = '<option value="">Select property</option>';

    data.properties.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.property_name;
      select.appendChild(opt);
    });

  } catch (e) {
    select.innerHTML = '<option>Error loading</option>';
  }
}

async function loadRooms() {
  const id = document.getElementById("propertySelect").value;
  const status = document.getElementById("status");

  if (!id) {
    status.textContent = "Select a property first.";
    return;
  }

  status.textContent = "Loading rooms...";
  document.getElementById("downloadBtn").disabled = true;

  try {
    const res = await fetch(`/api/property-rooms?propertyId=${id}`, { headers });
    const data = await res.json();

    property = data.property;
    rooms = data.rooms || [];

    status.textContent = `${rooms.length} rooms loaded.`;

    if (rooms.length) {
      document.getElementById("downloadBtn").disabled = false;
    }

  } catch (e) {
    status.textContent = "Failed to load rooms.";
  }
}

async function downloadZip() {
  const status = document.getElementById("status");
  const btn = document.getElementById("downloadBtn");

  if (!rooms.length) return;

  btn.disabled = true;
  status.textContent = "Generating QR package...";

  try {
    const zip = new JSZip();
    const folder = zip.folder("qr-codes");

    await Promise.all(rooms.map(async (room) => {
      const url = `https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(room.qr_url)}`;
      const res = await fetch(url);
      const blob = await res.blob();

      folder.file(`${room.qr_slug}.png`, blob);
    }));

    zip.file("rooms.json", JSON.stringify(rooms, null, 2));

    const blob = await zip.generateAsync({ type: "blob" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${property.property_slug}-qr.zip`;
    link.click();

    status.textContent = "Download ready.";

  } catch (e) {
    status.textContent = "ZIP failed.";
  }

  btn.disabled = false;
}

document.getElementById("loadBtn").onclick = loadRooms;
document.getElementById("downloadBtn").onclick = downloadZip;

loadProperties();
</script>
</body>
</html>
